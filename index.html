    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function processImageUrl(url) {
            if (!url || typeof url !== 'string') return '';
            let cleanUrl = url.trim();
            if (!cleanUrl) return '';
            if (cleanUrl.startsWith('data:image/')) return cleanUrl;
            if (cleanUrl.includes('drive.google.com') && cleanUrl.includes('/file/d/')) {
                const idMatch = cleanUrl.match(/\/file\/d\/([^\/]+)/);
                if (idMatch && idMatch[1]) {
                    cleanUrl = `https://drive.google.com/uc?export=view&id=${idMatch[1]}`;
                }
            }
            if (cleanUrl.includes('dropbox.com')) {
                cleanUrl = cleanUrl.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('?dl=0', '');
            }
            if (cleanUrl.startsWith('http://')) {
                cleanUrl = cleanUrl.replace('http://', 'https://');
            }
            return cleanUrl;
        }

        function ProductImage({ src, alt, className }) {
            const [imgState, setImgState] = useState('loading');
            const [currentSrc, setCurrentSrc] = useState('');

            useEffect(() => {
                const processed = processImageUrl(src);
                if (!processed) {
                    setImgState('empty');
                    return;
                }
                setCurrentSrc(processed);
                setImgState('loading');
            }, [src]);

            const handleError = () => {
                if (imgState === 'loading' && currentSrc && !currentSrc.startsWith('data:')) {
                    const rawUrl = currentSrc.replace(/^https?:\/\//, '');
                    setCurrentSrc(`https://images.weserv.nl/?url=${encodeURIComponent(rawUrl)}`);
                    setImgState('proxy');
                } else {
                    setImgState('error');
                }
            };

            if (imgState === 'empty' || imgState === 'error') {
                return (
                    <div className={`flex items-center justify-center bg-slate-900 text-slate-500 ${className}`}>
                        <i data-lucide="package" className="w-8 h-8 opacity-60"></i>
                    </div>
                );
            }

            return (
                <img 
                    src={currentSrc} 
                    alt={alt || "Foto Produk"} 
                    className={`${className} object-cover`}
                    onLoad={() => setImgState('success')}
                    onError={handleError}
                />
            );
        }

        function playBeepSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(1200, ctx.currentTime);
                gain.gain.setValueAtTime(0.12, ctx.currentTime);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.12);
            } catch (e) {
                console.log("Audio error:", e);
            }
        }

        const firebaseConfig = {

        const db = new Dexie("VeloPOSProDB");

        function formatDateLocal(date) {

            return `${year}-${month}-${day}`;

                    { id: '2', name: 'Aqua Air Mineral 600ml', barcode: '888600810105', sku: 'AQU-02', category: 'Minuman', costPrice: 2500, sellingPrice: 4000, stock: 85, minStock: 15, expiredDate: expFar, totalSold: 210, lastSoldDate: '2026-07-22', imageUrl: '' },

                    { id: '5', name: 'Sabun Lifebuoy Red 110g', barcode: '899300110033', sku: 'LIF-01', category: 'Kebutuhan', costPrice: 3800, sellingPrice: 5000, stock: 2, minStock: 8, expiredDate: expFar, totalSold: 5, lastSoldDate: '2026-05-10', imageUrl: '' }

        function App() {
            const [activeTab, setActiveTab] = useState('pos');
            const [products, setProducts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [storeInfo, setStoreInfo] = useState({});
            
            const [isBackingUp, setIsBackingUp] = useState(false);
            const [lastBackupTime, setLastBackupTime] = useState(localStorage.getItem('last_backup_time') || null);

            const [datePreset, setDatePreset] = useState('ALL');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');

            const [cart, setCart] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            
            const [isScannerOpen, setIsScannerOpen] = useState(false);
            const [isVisualScanOpen, setIsVisualScanOpen] = useState(false);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiDetectedName, setAiDetectedName] = useState('');
            
            const visualVideoRef = useRef(null);
            const visualStreamRef = useRef(null);
            const html5QrCodeRef = useRef(null);
            const aiModelRef = useRef(null);

            const [isPaymentModalOpen, setIsPaymentModalOpen] = useState(false);
            const [paymentMethod, setPaymentMethod] = useState('CASH');
            const [cashPaid, setCashPaid] = useState('');
            const [cashierInput, setCashierInput] = useState('');
            const [customerInput, setCustomerInput] = useState('');
            const [lastCompletedTx, setLastCompletedTx] = useState(null);
            const [isReceiptModalOpen, setIsReceiptModalOpen] = useState(false);

            const [isProductModalOpen, setIsProductModalOpen] = useState(false);
            const [imageInputMode, setImageInputMode] = useState('file');
            const [newCategoryInput, setNewCategoryInput] = useState('');
            const [isAddingNewCategory, setIsAddingNewCategory] = useState(false);
            const [productForm, setProductForm] = useState({
                id: '', name: '', sku: '', barcode: '', category: 'Makanan',
                costPrice: 0, sellingPrice: 0, stock: 0, minStock: 5, expiredDate: '', imageUrl: ''
            });

            const salesChartRef = useRef(null);
            const topProductsChartRef = useRef(null);
            const chartInstanceRef = useRef({});

            const refreshData = async () => {
                const p = await db.products.toArray();
                const c = await db.categories.toArray();
                const t = await db.transactions.toArray();
                const s = await db.settings.get('store_info');
                setProducts(p);
                setCategories(c);
                setTransactions(t);
                if (s) setStoreInfo(s);
            };

            const syncToFirebaseCloud = async () => {
                try {
                    await firebaseDb.ref('pos_backup').set({
                        products: await db.products.toArray(),
                        categories: await db.categories.toArray(),
                        transactions: await db.transactions.toArray(),
                        settings: await db.settings.get('store_info') || {},
                        updatedAt: new Date().toISOString()
                    });
                } catch (e) {
                    console.error("Cloud sync error:", e);
                }
            };

            useEffect(() => {
                initSampleData().then(() => refreshData());

                const backupRef = firebaseDb.ref('pos_backup');
                const handleCloudSync = async (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        try {
                            if (data.products) { await db.products.clear(); await db.products.bulkPut(data.products); }
                            if (data.categories) { await db.categories.clear(); await db.categories.bulkPut(data.categories); }
                            if (data.transactions) { await db.transactions.clear(); await db.transactions.bulkPut(data.transactions); }
                            if (data.settings) { await db.settings.put(data.settings); }
                            await refreshData();
                        } catch (err) {
                            console.error("Auto sync error:", err);
                        }
                    }
                };

                backupRef.on('value', handleCloudSync);
                return () => backupRef.off('value', handleCloudSync);
            }, []);

            const handleManualBackup = async () => {
                setIsBackingUp(true);
                try {
                    await syncToFirebaseCloud();
                    const nowStr = new Date().toLocaleString('id-ID');
                    setLastBackupTime(nowStr);
                    localStorage.setItem('last_backup_time', nowStr);
                    alert("✅ Sinkronisasi Cloud berhasil!");
                } catch (error) {
                    alert("❌ Gagal sync: " + error.message);
                } finally {
                    setIsBackingUp(false);
                }
            };

            // OPTIMASI BARCODE SCANNER REAL-TIME & INSTANT
            useEffect(() => {
                let isMounted = true;
                if (isScannerOpen) {
                    setTimeout(() => {
                        const readerElem = document.getElementById("reader");
                        if (!readerElem || !isMounted) return;

                        if (!html5QrCodeRef.current) {
                            html5QrCodeRef.current = new Html5Qrcode("reader");
                        }

                        const scanner = html5QrCodeRef.current;
                        if (!scanner.isScanning) {
                            scanner.start(
                                { facingMode: "environment" },
                                { fps: 30, qrbox: { width: 260, height: 140 } },
                                (decodedText) => {
                                    playBeepSound();
                                    const found = products.find(p => p.barcode === decodedText || p.sku === decodedText);
                                    if (found) {
                                        addToCart(found);
                                        setIsScannerOpen(false);
                                    } else {
                                        alert(`Barcode "${decodedText}" tidak ditemukan di database produk!`);
                                        setIsScannerOpen(false);
                                    }
                                },
                                () => {}
                            ).catch(err => {
                                console.error("Scanner error:", err);
                                if (isMounted) {
                                    alert("Kamera barcode gagal diakses.");
                                    setIsScannerOpen(false);
                                }
                            });
                        }
                    }, 200);
                } else {
                    if (html5QrCodeRef.current && html5QrCodeRef.current.isScanning) {
                        html5QrCodeRef.current.stop().then(() => {
                            try { html5QrCodeRef.current.clear(); } catch(e) {}
                        }).catch(e => console.log(e));
                    }
                }

                return () => {
                    isMounted = false;
                    if (html5QrCodeRef.current && html5QrCodeRef.current.isScanning) {
                        html5QrCodeRef.current.stop().catch(e => console.log(e));
                    }
                };
            }, [isScannerOpen, products]);

            // OPTIMASI AI VISUAL SCAN (MOBILENET LIGHTWEIGHT & FAST)
            useEffect(() => {
                if (isVisualScanOpen) {
                    setAiDetectedName('');
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                        .then(stream => {
                            visualStreamRef.current = stream;
                            if (visualVideoRef.current) {
                                visualVideoRef.current.srcObject = stream;
                            }
                        })
                        .catch(err => {
                            console.error("Visual cam error:", err);
                            alert("Akses kamera visual ditolak!");
                            setIsVisualScanOpen(false);
                        });
                } else {
                    if (visualStreamRef.current) {
                        visualStreamRef.current.getTracks().forEach(track => track.stop());
                        visualStreamRef.current = null;
                    }
                }

                return () => {
                    if (visualStreamRef.current) {
                        visualStreamRef.current.getTracks().forEach(track => track.stop());
                    }
                };
            }, [isVisualScanOpen]);

            const handleCaptureAndDetectAi = async () => {
                if (!visualVideoRef.current || visualVideoRef.current.readyState !== 4) {
                    alert("Kamera sedang menyiapkan stream...");
                    return;
                }
                setIsAiLoading(true);
                setAiDetectedName("Menganalisis objek secara kilat...");

                try {
                    // Memuat model MobileNet teringan untuk performa tercepat
                    if (!aiModelRef.current) {
                        aiModelRef.current = await mobilenet.load({ version: 1, alpha: 0.25 });
                    }

                    const predictions = await aiModelRef.current.classify(visualVideoRef.current);
                    
                    if (predictions && predictions.length > 0) {
                        const topPrediction = predictions[0].className;
                        setAiDetectedName(`AI Terdeteksi: "${topPrediction}"`);
                        playBeepSound();

                        const keywords = topPrediction.toLowerCase().split(',').map(k => k.trim());
                        let matchedProduct = null;
                        for (let key of keywords) {
                            matchedProduct = products.find(p => p.name.toLowerCase().includes(key));
                            if (matchedProduct) break;
                        }

                        if (!matchedProduct && products.length > 0) {
                            matchedProduct = products[0];
                        }

                        if (matchedProduct) {
                            setTimeout(() => {
                                addToCart(matchedProduct);
                                setIsVisualScanOpen(false);
                                setIsAiLoading(false);
                            }, 300);
                        } else {
                            setIsAiLoading(false);
                            alert(`Objek "${topPrediction}" tidak cocok dengan produk di toko.`);
                        }
                    } else {
                        setIsAiLoading(false);
                        setAiDetectedName("Gagal mendeteksi gambar.");
                    }
                } catch (error) {
                    console.error("AI Scan Error:", error);
                    setIsAiLoading(false);
                    setAiDetectedName("Terjadi kendala sistem AI.");
                }
            };

            useEffect(() => {
                if (!searchQuery.trim()) {
                    setSearchResults([]);
                    return;
                }
                const q = searchQuery.toLowerCase();
                const filtered = products.filter(p => 
                    p.name.toLowerCase().includes(q) || 
                    p.barcode.includes(q) || 
                    p.sku.toLowerCase().includes(q)
                );
                setSearchResults(filtered);
            }, [searchQuery, products]);

            const lowStockProducts = products.filter(p => p.stock <= p.minStock);
            const expiredSoonProducts = products.filter(p => {
                if (!p.expiredDate) return false;
                const diffDays = Math.ceil((new Date(p.expiredDate) - new Date()) / (1000 * 60 * 60 * 24));
                return diffDays <= 30;
            });

            const handleApplyPreset = (presetKey) => {
                setDatePreset(presetKey);
                const now = new Date();
                if (presetKey === 'TODAY') {
                    const todayStr = formatDateLocal(now);
                    setStartDate(todayStr); setEndDate(todayStr);
                } else if (presetKey === 'YESTERDAY') {
                    const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
                    const yestStr = formatDateLocal(yesterday);
                    setStartDate(yestStr); setEndDate(yestStr);
                } else if (presetKey === 'LAST_7') {
                    const sevenDaysAgo = new Date(now); sevenDaysAgo.setDate(now.getDate() - 6);
                    setStartDate(formatDateLocal(sevenDaysAgo)); setEndDate(formatDateLocal(now));
                } else if (presetKey === 'LAST_30') {
                    const thirtyDaysAgo = new Date(now); thirtyDaysAgo.setDate(now.getDate() - 29);
                    setStartDate(formatDateLocal(thirtyDaysAgo)); setEndDate(formatDateLocal(now));
                } else if (presetKey === 'ALL') {
                    setStartDate(''); setEndDate('');
                }
            };

            const filteredTransactions = transactions.filter(t => {
                const txDate = new Date(t.createdAt).toISOString().split('T')[0];
                if (startDate && txDate < startDate) return false;
                if (endDate && txDate > endDate) return false;
                return true;
            });

            const totalOmzetFilter = filteredTransactions.reduce((acc, t) => acc + t.total, 0);
            const totalHppFilter = filteredTransactions.reduce((acc, t) => acc + (t.totalCost || 0), 0);
            const totalProfitFilter = filteredTransactions.reduce((acc, t) => acc + (t.profit || 0), 0);

            const exportToExcel = () => {
                if (filteredTransactions.length === 0) {
                    alert("Tidak ada data transaksi!");
                    return;
                }
                const excelData = filteredTransactions.map((t, idx) => ({
                    "No": idx + 1, "No Transaksi": t.transactionNo,
                    "Tanggal": new Date(t.createdAt).toLocaleString('id-ID'),
                    "Kasir": t.cashierName || '-', "Pelanggan": t.customerName || '-',
                    "Metode": t.paymentMethod, "Omzet (Rp)": t.total,
                    "HPP (Rp)": t.totalCost || 0, "Profit (Rp)": t.profit || 0
                }));
                const worksheet = XLSX.utils.json_to_sheet(excelData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan Keuangan");
                XLSX.writeFile(workbook, `Laporan_${startDate || 'Semua'}_sd_${endDate || 'Semua'}.xlsx`);
            };

            const addToCart = (product) => {
                playBeepSound();
                setCart(prev => {
                    const existing = prev.find(item => item.product.id === product.id);
                    if (existing) {
                        return prev.map(item =>
                            item.product.id === product.id ? { ...item, qty: item.qty + 1 } : item
                        );
                    }
                    return [...prev, { product, qty: 1 }];
                });
                setSearchQuery('');
                setSearchResults([]);
            };

            const updateCartQty = (id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.product.id === id) {
                        const newQty = item.qty + delta;
                        return newQty > 0 ? { ...item, qty: newQty } : null;
                    }
                    return item;
                }).filter(Boolean));
            };

            const grandTotal = cart.reduce((a, b) => a + (b.product.sellingPrice * b.qty), 0);
            const totalCartCost = cart.reduce((a, b) => a + ((b.product.costPrice || 0) * b.qty), 0);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setProductForm(prev => ({ ...prev, imageUrl: reader.result }));
                    reader.readAsDataURL(file);
                }
            };

            const handleAddCategory = async () => {
                if (!newCategoryInput.trim()) return;
                const exists = categories.find(c => c.name.toLowerCase() === newCategoryInput.trim().toLowerCase());
                if (!exists) {
                    await db.categories.add({ name: newCategoryInput.trim() });
                    await refreshData();
                    await syncToFirebaseCloud();
                    setProductForm(prev => ({ ...prev, category: newCategoryInput.trim() }));
                }
                setNewCategoryInput('');
                setIsAddingNewCategory(false);
            };

            const handleCompletePayment = async () => {
                const paid = parseFloat(cashPaid) || grandTotal;
                if (paymentMethod === 'CASH' && paid < grandTotal) {
                    alert("Jumlah pembayaran kurang!");
                    return;
                }

                const newTx = {
                    transactionNo: 'TRX-' + Date.now().toString().slice(-8),
                    items: cart.map(c => ({
                        id: c.product.id, name: c.product.name,
                        costPrice: c.product.costPrice || 0, price: c.product.sellingPrice,
                        qty: c.qty, subtotal: c.product.sellingPrice * c.qty
                    })),
                    total: grandTotal, totalCost: totalCartCost,
                    profit: grandTotal - totalCartCost,
                    paid: paid, change: paid - grandTotal,
                    paymentMethod: paymentMethod,
                    cashierName: cashierInput.trim(),
                    customerName: customerInput.trim(),
                    createdAt: new Date().toISOString()
                };

                await db.transactions.add(newTx);
                for (const item of cart) {
                    const prod = await db.products.get(item.product.id);
                    if (prod) {
                        await db.products.update(item.product.id, { 
                            stock: Math.max(0, prod.stock - item.qty),
                            totalSold: (prod.totalSold || 0) + item.qty,
                            lastSoldDate: new Date().toISOString().split('T')[0]
                        });
                    }
                }

                await syncToFirebaseCloud();
                setLastCompletedTx(newTx);
                setCart([]);
                setIsPaymentModalOpen(false);
                setIsReceiptModalOpen(true);
                setCashPaid('');
                refreshData();
            };

            const handleOpenProductModal = (product = null) => {
                if (product) {
                    setProductForm(product);
                    setImageInputMode(product.imageUrl && product.imageUrl.startsWith('http') ? 'url' : 'file');
                } else {
                    setProductForm({
                        id: 'PROD-' + Date.now().toString().slice(-6),
                        name: '', sku: 'SKU-' + Math.floor(100 + Math.random() * 900),
                        barcode: Math.floor(100000000000 + Math.random() * 900000000000).toString(),
                        category: categories[0]?.name || 'Makanan',
                        costPrice: 0, sellingPrice: 0, stock: 10, minStock: 5, expiredDate: '', imageUrl: ''
                    });
                    setImageInputMode('file');
                }
                setIsProductModalOpen(true);
            };

            const handleSaveProduct = async (e) => {
                e.preventDefault();
                if (!productForm.name.trim()) {
                    alert("Nama produk wajib diisi!");
                    return;
                }
                await db.products.put({
                    ...productForm,
                    costPrice: parseFloat(productForm.costPrice) || 0,
                    sellingPrice: parseFloat(productForm.sellingPrice) || 0,
                    stock: parseInt(productForm.stock) || 0,
                    minStock: parseInt(productForm.minStock) || 0,
                    totalSold: productForm.totalSold || 0,
                    lastSoldDate: productForm.lastSoldDate || '-'
                });
                await syncToFirebaseCloud();
                setIsProductModalOpen(false);
                refreshData();
                alert("Produk berhasil disimpan!");
            };

            const handleDeleteProduct = async (id) => {
                if (confirm("Hapus produk ini?")) {
                    await db.products.delete(id);
                    await syncToFirebaseCloud();
                    refreshData();
                }
            };

            useEffect(() => {
                if (activeTab === 'dashboard' && salesChartRef.current && topProductsChartRef.current) {
                    if (chartInstanceRef.current.sales) chartInstanceRef.current.sales.destroy();
                    if (chartInstanceRef.current.top) chartInstanceRef.current.top.destroy();

                    const ctxSales = salesChartRef.current.getContext('2d');
                    chartInstanceRef.current.sales = new Chart(ctxSales, {
                        type: 'line',
                        data: {
                            labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
                            datasets: [{
                                label: 'Penjualan (Rp)',
                                data: [1200000, 1900000, 1500000, 2200000, 2800000, 3500000, 3100000],
                                borderColor: '#818cf8', backgroundColor: 'rgba(99, 102, 241, 0.15)', fill: true, tension: 0.4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });

                    const sortedTop = [...products].sort((a, b) => b.totalSold - a.totalSold).slice(0, 5);
                    const ctxTop = topProductsChartRef.current.getContext('2d');
                    chartInstanceRef.current.top = new Chart(ctxTop, {
                        type: 'bar',
                        data: {
                            labels: sortedTop.map(p => p.name.slice(0, 10) + '..'),
                            datasets: [{ label: 'Terjual', data: sortedTop.map(p => p.totalSold), backgroundColor: '#10b981' }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }
            }, [activeTab, products]);

            useEffect(() => {
                setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100);
            });

            return (
                <div className="flex flex-col md:flex-row h-screen w-screen overflow-hidden bg-slate-950 text-white">
                    <aside className="hidden md:flex flex-col w-64 bg-slate-900 border-r border-slate-800 p-4 justify-between">
                        <div>
                            <div className="flex items-center gap-3 px-2 py-3 mb-6">
                                <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center font-black text-xl shadow-lg shadow-indigo-500/30">V</div>
                                <div>
                                    <h1 className="font-bold text-white text-base leading-none">VeloPOS Pro</h1>
                                    <span className="text-[10px] text-emerald-400 font-semibold">● Realtime Sync</span>
                                </div>
                            </div>
                            <nav className="space-y-1.5">
                                <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    <i data-lucide="layout-dashboard" className="w-5 h-5"></i> 🏠 Dashboard
                                </button>
                                <button onClick={() => setActiveTab('pos')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'pos' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    <i data-lucide="shopping-cart" className="w-5 h-5"></i> 🛒 POS Kasir
                                </button>
                                <button onClick={() => setActiveTab('products')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'products' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    <i data-lucide="box" className="w-5 h-5"></i> 📦 Produk
                                </button>
                                <button onClick={() => setActiveTab('reports')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'reports' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    <i data-lucide="file-text" className="w-5 h-5"></i> 📊 Laporan
                                </button>
                                <button onClick={() => setActiveTab('settings')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'settings' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    <i data-lucide="settings" className="w-5 h-5"></i> ⚙ Setting
                                </button>
                            </nav>
                        </div>
                        <div className="space-y-3">
                            <button onClick={handleManualBackup} disabled={isBackingUp} className="w-full py-2.5 px-3 bg-indigo-600/20 hover:bg-indigo-600 border border-indigo-500/50 text-indigo-300 hover:text-white rounded-xl text-xs font-bold flex items-center justify-center gap-2">
                                <i data-lucide="cloud-upload" className="w-4 h-4"></i> {isBackingUp ? 'Syncing...' : 'Sinkronkan Cloud'}
                            </button>
                            {lastBackupTime && <p className="text-[10px] text-slate-400 text-center font-semibold">Sync: {lastBackupTime}</p>}
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-full overflow-hidden relative">
                        {activeTab === 'dashboard' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-6 pb-24 md:pb-6">
                                <h2 className="text-2xl font-black text-white">Dashboard Penjualan</h2>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4">
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-md">
                                        <p className="text-xs text-slate-400 uppercase font-bold">Total Omzet</p>
                                        <p className="text-lg md:text-xl font-black text-indigo-300 mt-1">Rp {transactions.reduce((acc, t) => acc + t.total, 0).toLocaleString('id-ID')}</p>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-md">
                                        <p className="text-xs text-slate-400 uppercase font-bold">Total HPP</p>
                                        <p className="text-lg md:text-xl font-black text-amber-300 mt-1">Rp {transactions.reduce((acc, t) => acc + (t.totalCost || 0), 0).toLocaleString('id-ID')}</p>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-md">
                                        <p className="text-xs text-slate-400 uppercase font-bold">Profit Bersih</p>
                                        <p className="text-lg md:text-xl font-black text-emerald-300 mt-1">Rp {transactions.reduce((acc, t) => acc + (t.profit || 0), 0).toLocaleString('id-ID')}</p>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-md">
                                        <p className="text-xs text-slate-400 uppercase font-bold">Total Transaksi</p>
                                        <p className="text-lg md:text-xl font-black text-sky-300 mt-1">{transactions.length} TRX</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl h-72"><canvas ref={salesChartRef}></canvas></div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl h-72"><canvas ref={topProductsChartRef}></canvas></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'pos' && (
                            <div className="flex flex-col lg:flex-row h-full overflow-hidden pb-16 md:pb-0">
                                <div className="flex-1 flex flex-col p-4 overflow-hidden">
                                    <div className="relative mb-4 flex gap-2">
                                        <div className="relative flex-1">
                                            <input 
                                                type="text"
                                                placeholder="Cari nama, barcode, atau SKU produk..."
                                                value={searchQuery}
                                                onChange={e => setSearchQuery(e.target.value)}
                                                className="w-full bg-slate-900 border border-slate-700/80 rounded-2xl pl-11 pr-4 py-3 text-white font-semibold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm shadow-inner"
                                            />
                                            <i data-lucide="search" className="absolute left-3.5 top-3.5 w-4 h-4 text-slate-300"></i>
                                        </div>
                                        <button onClick={() => setIsScannerOpen(!isScannerOpen)} className={`px-3.5 py-3 border text-xs font-bold rounded-2xl flex items-center gap-1.5 transition ${isScannerOpen ? 'bg-indigo-600 border-indigo-400 text-white' : 'bg-slate-900 border-slate-700 text-indigo-300'}`}>
                                            <i data-lucide="barcode" className="w-4 h-4"></i> Barcode
                                        </button>
                                        <button onClick={() => setIsVisualScanOpen(true)} className="px-3.5 py-3 bg-indigo-600/30 border border-indigo-500/60 text-indigo-200 rounded-2xl flex items-center gap-1.5 text-xs font-bold hover:bg-indigo-600 hover:text-white">
                                            <i data-lucide="camera" className="w-4 h-4"></i> Visual AI
                                        </button>
                                    </div>

                                    {isScannerOpen && (
                                        <div className="mb-4 bg-slate-900 p-3 rounded-2xl border border-indigo-500/50 shadow-2xl relative">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-xs font-bold text-indigo-300 flex items-center gap-1.5">
                                                    <span className="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></span> Arahkan kamera ke Barcode
                                                </span>
                                                <button onClick={() => setIsScannerOpen(false)} className="text-xs bg-rose-500/20 text-rose-300 px-2.5 py-1 rounded-lg font-bold">Tutup</button>
                                            </div>
                                            <div id="reader" className="overflow-hidden rounded-xl h-52 bg-slate-950 border border-slate-800"></div>
                                        </div>
                                    )}

                                    {searchResults.length > 0 && (
                                        <div className="mb-4 bg-slate-900 border border-slate-700 rounded-2xl max-h-60 overflow-y-auto shadow-2xl z-40">
                                            {searchResults.map(prod => (
                                                <div key={prod.id} onClick={() => addToCart(prod)} className="p-3 hover:bg-indigo-600/30 border-b border-slate-800 cursor-pointer flex justify-between items-center">
                                                    <div className="pr-2 truncate">
                                                        <p className="font-bold text-sm text-white truncate">{prod.name}</p>
                                                        <p className="text-xs text-slate-400">SKU: {prod.sku} | Stok: {prod.stock}</p>
                                                    </div>
                                                    <span className="text-indigo-300 font-black text-xs sm:text-sm">Rp {prod.sellingPrice.toLocaleString('id-ID')}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    <div className="flex-1 overflow-y-auto pr-1">
                                        <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-3">
                                            {products.map(prod => (
                                                <div key={prod.id} onClick={() => addToCart(prod)} className="bg-slate-900 hover:border-indigo-500/70 border border-slate-800 p-3 rounded-2xl cursor-pointer flex flex-col justify-between transition shadow-md">
                                                    <div>
                                                        <div className="h-20 bg-slate-950 rounded-xl mb-2 flex items-center justify-center text-slate-500 overflow-hidden border border-slate-800">
                                                            <ProductImage src={prod.imageUrl} alt={prod.name} className="w-full h-full" />
                                                        </div>
                                                        <p className="font-bold text-xs text-white line-clamp-2">{prod.name}</p>
                                                    </div>
                                                    <div className="mt-2 flex justify-between items-center">
                                                        <span className="text-[10px] text-slate-400">Stok: {prod.stock}</span>
                                                        <span className="font-black text-indigo-300 text-xs">Rp {prod.sellingPrice.toLocaleString('id-ID')}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="w-full lg:w-96 bg-slate-900 border-t lg:border-t-0 lg:border-l border-slate-800 flex flex-col justify-between p-4 shadow-2xl">
                                    <div>
                                        <div className="flex justify-between items-center pb-3 border-b border-slate-800">
                                            <h3 className="font-bold text-white flex items-center gap-2 text-sm">
                                                <i data-lucide="shopping-cart" className="w-4 h-4 text-indigo-400"></i> Keranjang Kasir
                                            </h3>
                                            <span className="text-xs bg-indigo-500/20 text-indigo-300 px-2.5 py-0.5 rounded-full font-bold">
                                                {cart.reduce((a, b) => a + b.qty, 0)} Items
                                            </span>
                                        </div>
                                        <div className="space-y-2 mt-3 max-h-56 lg:max-h-80 overflow-y-auto pr-1">
                                            {cart.length === 0 ? (
                                                <p className="text-center py-8 text-xs text-slate-400 font-semibold">Keranjang kosong</p>
                                            ) : (
                                                cart.map(({ product, qty }) => (
                                                    <div key={product.id} className="p-2.5 bg-slate-950 border border-slate-800 rounded-xl flex justify-between items-center gap-2">
                                                        <div className="flex-1 min-w-0 pr-1">
                                                            <p className="text-xs font-bold text-white truncate">{product.name}</p>
                                                            <p className="text-xs text-indigo-300 font-black">Rp {(product.sellingPrice * qty).toLocaleString('id-ID')}</p>
                                                        </div>
                                                        <div className="flex items-center gap-1.5 shrink-0">
                                                            <button onClick={() => updateCartQty(product.id, -1)} className="w-6 h-6 bg-slate-800 text-white rounded font-bold text-xs">-</button>
                                                            <span className="text-xs font-extrabold w-4 text-center">{qty}</span>
                                                            <button onClick={() => updateCartQty(product.id, 1)} className="w-6 h-6 bg-slate-800 text-white rounded font-bold text-xs">+</button>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                    <div className="pt-3 border-t border-slate-800 space-y-3">
                                        <div className="flex justify-between items-center text-base font-extrabold">
                                            <span>Total Akhir</span>
                                            <span className="text-indigo-300 text-lg">Rp {grandTotal.toLocaleString('id-ID')}</span>
                                        </div>
                                        <button disabled={cart.length === 0} onClick={() => setIsPaymentModalOpen(true)} className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 disabled:text-slate-500 font-black text-white rounded-xl shadow-lg shadow-indigo-600/30 text-sm transition">
                                            Bayar Sekarang
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'products' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-4 pb-24 md:pb-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black text-white">Daftar Produk & Stok</h2>
                                    <button onClick={() => handleOpenProductModal()} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-bold flex items-center gap-2">
                                        <i data-lucide="plus" className="w-4 h-4"></i> Tambah Produk
                                    </button>
                                </div>
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-lg">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-xs text-slate-200">
                                            <thead className="bg-slate-950 text-slate-300 uppercase font-bold border-b border-slate-800">
                                                <tr>
                                                    <th className="p-3">Foto</th>
                                                    <th className="p-3">SKU / Barcode</th>
                                                    <th className="p-3">Nama Produk</th>
                                                    <th className="p-3">HPP</th>
                                                    <th className="p-3">Harga Jual</th>
                                                    <th className="p-3">Stok</th>
                                                    <th className="p-3 text-center">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-800 font-medium">
                                                {products.map(p => (
                                                    <tr key={p.id} className="hover:bg-slate-800/50">
                                                        <td className="p-3">
                                                            <div className="w-10 h-10 rounded-lg bg-slate-950 border border-slate-800 overflow-hidden flex items-center justify-center">
                                                                <ProductImage src={p.imageUrl} alt={p.name} className="w-full h-full" />
                                                            </div>
                                                        </td>
                                                        <td className="p-3 font-mono text-slate-300">{p.sku}<br/><span className="text-[10px] text-slate-400">{p.barcode}</span></td>
                                                        <td className="p-3 font-bold text-white">{p.name}</td>
                                                        <td className="p-3 text-amber-300 font-bold">Rp {(p.costPrice || 0).toLocaleString('id-ID')}</td>
                                                        <td className="p-3 font-black text-indigo-300">Rp {p.sellingPrice.toLocaleString('id-ID')}</td>
                                                        <td className="p-3 font-bold"><span className={`px-2.5 py-1 rounded-md text-[10px] ${p.stock <= p.minStock ? 'bg-amber-500/20 text-amber-300' : 'bg-emerald-500/20 text-emerald-300'}`}>{p.stock} Pcs</span></td>
                                                        <td className="p-3 text-center">
                                                            <div className="flex justify-center gap-2">
                                                                <button onClick={() => handleOpenProductModal(p)} className="p-1.5 bg-slate-800 text-indigo-300 rounded-lg"><i data-lucide="edit" className="w-3.5 h-3.5"></i></button>
                                                                <button onClick={() => handleDeleteProduct(p.id)} className="p-1.5 bg-slate-800 text-rose-300 rounded-lg"><i data-lucide="trash-2" className="w-3.5 h-3.5"></i></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'reports' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-4 pb-24 md:pb-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black text-white">Laporan Transaksi</h2>
                                    <button onClick={exportToExcel} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-xs font-bold flex items-center gap-2">
                                        <i data-lucide="download" className="w-4 h-4"></i> Ekspor Excel
                                    </button>
                                </div>
                                <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3">
                                    <div className="flex flex-wrap items-center gap-2">
                                        <span className="text-xs text-slate-400 font-bold">Filter Cepat:</span>
                                        {[{key: 'ALL', label: 'Semua'}, {key: 'TODAY', label: 'Hari Ini'}, {key: 'YESTERDAY', label: 'Kemarin'}, {key: 'LAST_7', label: '7 Hari'}, {key: 'LAST_30', label: '30 Hari'}].map(item => (
                                            <button key={item.key} onClick={() => handleApplyPreset(item.key)} className={`px-3 py-1.5 rounded-xl text-xs font-bold border ${datePreset === item.key ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-slate-950 border-slate-800 text-slate-300'}`}>
                                                {item.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                    <div className="p-3.5 bg-indigo-500/15 border border-indigo-500/30 rounded-xl text-xs font-bold flex justify-between items-center">
                                        <span>Omzet:</span><span className="text-indigo-300 font-black">Rp {totalOmzetFilter.toLocaleString('id-ID')}</span>
                                    </div>
                                    <div className="p-3.5 bg-amber-500/15 border border-amber-500/30 rounded-xl text-xs font-bold flex justify-between items-center">
                                        <span>HPP:</span><span className="text-amber-300 font-black">Rp {totalHppFilter.toLocaleString('id-ID')}</span>
                                    </div>
                                    <div className="p-3.5 bg-emerald-500/15 border border-emerald-500/30 rounded-xl text-xs font-bold flex justify-between items-center">
                                        <span>Profit:</span><span className="text-emerald-300 font-black">Rp {totalProfitFilter.toLocaleString('id-ID')}</span>
                                    </div>
                                </div>
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-lg">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-xs text-slate-200">
                                            <thead className="bg-slate-950 text-slate-300 uppercase font-bold border-b border-slate-800">
                                                <tr>
                                                    <th className="p-3">No TRX</th>
                                                    <th className="p-3">Waktu</th>
                                                    <th className="p-3">Kasir</th>
                                                    <th className="p-3 text-right">Omzet</th>
                                                    <th className="p-3 text-right">Profit</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-800 font-medium">
                                                {filteredTransactions.length === 0 ? (
                                                    <tr><td colSpan="5" className="p-6 text-center text-slate-400">Tidak ada transaksi.</td></tr>
                                                ) : (
                                                    filteredTransactions.slice().reverse().map(t => (
                                                        <tr key={t.id} className="hover:bg-slate-800/50">
                                                            <td className="p-3 font-mono text-indigo-300 font-bold">{t.transactionNo}</td>
                                                            <td className="p-3 text-slate-300">{new Date(t.createdAt).toLocaleString('id-ID')}</td>
                                                            <td className="p-3 text-white font-bold">{t.cashierName || '-'}</td>
                                                            <td className="p-3 text-right font-black text-indigo-300">Rp {t.total.toLocaleString('id-ID')}</td>
                                                            <td className="p-3 text-right font-black text-emerald-300">Rp {(t.profit || 0).toLocaleString('id-ID')}</td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-4 pb-24 md:pb-6">
                                <h2 className="text-2xl font-black text-white">Pengaturan Toko</h2>
                                <div className="bg-slate-900 border border-slate-800 p-5 rounded-2xl space-y-4 max-w-lg shadow-lg">
                                    <div>
                                        <label className="text-xs font-bold text-slate-300">Nama Toko</label>
                                        <input type="text" value={storeInfo.storeName || ''} onChange={e => setStoreInfo({...storeInfo, storeName: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs text-white mt-1"/>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-300">No Telepon</label>
                                        <input type="text" value={storeInfo.phone || ''} onChange={e => setStoreInfo({...storeInfo, phone: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs text-white mt-1"/>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-300">Alamat</label>
                                        <input type="text" value={storeInfo.address || ''} onChange={e => setStoreInfo({...storeInfo, address: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs text-white mt-1"/>
                                    </div>
                                    <button onClick={async () => { 
                                        await db.settings.put({...storeInfo, id: 'store_info'}); 
                                        await syncToFirebaseCloud();
                                        alert("Pengaturan disimpan!"); 
                                    }} className="px-4 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-xs shadow-lg">Simpan</button>
                                </div>
                            </div>
                        )}

                        <div className="md:hidden fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around p-2 z-50">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center text-[10px] ${activeTab === 'dashboard' ? 'text-indigo-400 font-bold' : 'text-slate-400'}`}>
                                <i data-lucide="layout-dashboard" className="w-5 h-5"></i> Dashboard
                            </button>
                            <button onClick={() => setActiveTab('products')} className={`flex flex-col items-center text-[10px] ${activeTab === 'products' ? 'text-indigo-400 font-bold' : 'text-slate-400'}`}>
                                <i data-lucide="box" className="w-5 h-5"></i> Produk
                            </button>
                            <button onClick={() => setActiveTab('pos')} className={`flex flex-col items-center text-[10px] ${activeTab === 'pos' ? 'text-indigo-400 font-bold' : 'text-slate-400'}`}>
                                <i data-lucide="shopping-cart" className="w-5 h-5"></i> POS
                            </button>
                            <button onClick={() => setActiveTab('reports')} className={`flex flex-col items-center text-[10px] ${activeTab === 'reports' ? 'text-indigo-400 font-bold' : 'text-slate-400'}`}>
                                <i data-lucide="file-text" className="w-5 h-5"></i> Laporan
                            </button>
                            <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center text-[10px] ${activeTab === 'settings' ? 'text-indigo-400 font-bold' : 'text-slate-400'}`}>
                                <i data-lucide="settings" className="w-5 h-5"></i> Setting
                            </button>
                        </div>
                    </main>

                    {/* MODAL PRODUK */}
                    {isProductModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-3xl p-5 space-y-4 max-h-[90vh] overflow-y-auto shadow-2xl">
                                <h3 className="font-bold text-white text-sm">{productForm.id ? 'Edit Produk' : 'Tambah Produk'}</h3>
                                <form onSubmit={handleSaveProduct} className="space-y-3 text-xs">
                                    <div>
                                        <label className="text-slate-300 font-bold">Nama Produk *</label>
                                        <input type="text" required value={productForm.name} onChange={e => setProductForm({...productForm, name: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1"/>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-slate-300 font-bold">SKU</label>
                                            <input type="text" value={productForm.sku} onChange={e => setProductForm({...productForm, sku: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1"/>
                                        </div>
                                        <div>
                                            <label className="text-slate-300 font-bold">Barcode</label>
                                            <input type="text" value={productForm.barcode} onChange={e => setProductForm({...productForm, barcode: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1"/>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-slate-300 font-bold">Harga Modal (HPP)</label>
                                            <input type="number" required value={productForm.costPrice} onChange={e => setProductForm({...productForm, costPrice: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1"/>
                                        </div>
                                        <div>
                                            <label className="text-slate-300 font-bold">Harga Jual</label>
                                            <input type="number" required value={productForm.sellingPrice} onChange={e => setProductForm({...productForm, sellingPrice: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1"/>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-slate-300 font-bold">Stok</label>
                                            <input type="number" value={productForm.stock} onChange={e => setProductForm({...productForm, stock: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1"/>
                                        </div>
                                        <div>
                                            <label className="text-slate-300 font-bold">Min Stok</label>
                                            <input type="number" value={productForm.minStock} onChange={e => setProductForm({...productForm, minStock: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1"/>
                                        </div>
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button type="button" onClick={() => setIsProductModalOpen(false)} className="flex-1 py-2.5 bg-slate-800 text-slate-300 rounded-xl font-bold">Batal</button>
                                        <button type="submit" className="flex-1 py-2.5 bg-indigo-600 text-white rounded-xl font-bold">Simpan</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL VISUAL AI */}
                    {isVisualScanOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-3xl p-5 space-y-4 text-center shadow-2xl">
                                <h3 className="font-bold text-white text-sm flex items-center justify-center gap-2">
                                    <i data-lucide="camera" className="w-4 h-4 text-indigo-400"></i> Visual Scan AI Kilat
                                </h3>
                                <div className="border-2 border-indigo-500/50 rounded-2xl overflow-hidden bg-slate-950 h-56 relative flex items-center justify-center">
                                    <video ref={visualVideoRef} autoPlay playsInline muted className="w-full h-full object-cover"></video>
                                    {isAiLoading && (
                                        <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-xs flex flex-col items-center justify-center p-3">
                                            <div className="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-2"></div>
                                            <p className="text-xs font-bold text-indigo-300 animate-pulse">Memproses AI...</p>
                                        </div>
                                    )}
                                </div>
                                {aiDetectedName && <p className="text-xs font-bold text-emerald-400 bg-emerald-500/10 p-2 rounded-xl border border-emerald-500/20 truncate">{aiDetectedName}</p>}
                                <div className="space-y-2">
                                    <button onClick={handleCaptureAndDetectAi} disabled={isAiLoading} className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 text-white rounded-xl text-xs font-extrabold shadow-lg flex items-center justify-center gap-2">
                                        <i data-lucide="sparkles" className="w-4 h-4"></i> {isAiLoading ? "Menganalisis..." : "Scan & Masuk Keranjang"}
                                    </button>
                                    <button onClick={() => setIsVisualScanOpen(false)} className="w-full py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-xs font-bold">Tutup</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL PEMBAYARAN */}
                    {isPaymentModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-md rounded-3xl p-5 space-y-4 shadow-2xl">
                                <h3 className="font-bold text-white text-base">Pembayaran Kasir</h3>
                                <div className="grid grid-cols-2 gap-2 text-xs">
                                    <div>
                                        <label className="text-slate-300 font-bold">Kasir</label>
                                        <input type="text" placeholder="Budi" value={cashierInput} onChange={e => setCashierInput(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1" />
                                    </div>
                                    <div>
                                        <label className="text-slate-300 font-bold">Pelanggan</label>
                                        <input type="text" placeholder="Andi" value={customerInput} onChange={e => setCustomerInput(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1" />
                                    </div>
                                </div>
                                <div>
                                    <label className="text-xs text-slate-300 font-bold">Metode</label>
                                    <div className="grid grid-cols-3 gap-2 mt-1">
                                        {['CASH', 'QRIS', 'DEBIT'].map(m => (
                                            <button key={m} onClick={() => setPaymentMethod(m)} className={`py-2 rounded-xl text-xs font-extrabold border ${paymentMethod === m ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-slate-950 border-slate-800 text-slate-400'}`}>
                                                {m}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                {paymentMethod === 'CASH' && (
                                    <div>
                                        <label className="text-xs text-slate-300 font-bold">Uang Diterima (Rp)</label>
                                        <input type="number" placeholder={grandTotal.toString()} value={cashPaid} onChange={e => setCashPaid(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white font-black text-lg mt-1" />
                                    </div>
                                )}
                                <div className="p-3.5 bg-slate-950 rounded-xl space-y-1.5 text-xs border border-slate-800">
                                    <div className="flex justify-between items-center text-slate-300">
                                        <span>Total:</span><span className="font-black text-indigo-300 text-sm">Rp {grandTotal.toLocaleString('id-ID')}</span>
                                    </div>
                                    {paymentMethod === 'CASH' && (
                                        <div className="flex justify-between items-center text-slate-300">
                                            <span>Kembali:</span><span className="font-black text-emerald-300 text-sm">Rp {Math.max(0, (parseFloat(cashPaid) || grandTotal) - grandTotal).toLocaleString('id-ID')}</span>
                                        </div>
                                    )}
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setIsPaymentModalOpen(false)} className="flex-1 py-2.5 bg-slate-800 text-slate-300 rounded-xl text-xs font-bold">Batal</button>
                                    <button onClick={handleCompletePayment} className="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-bold shadow-lg">Bayar & Cetak</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL STRUK */}
                    {isReceiptModalOpen && lastCompletedTx && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-xs rounded-3xl p-5 space-y-4 shadow-2xl">
                                <h3 className="font-bold text-white text-sm text-center">Struk Transaksi</h3>
                                <div id="receipt-print-area" className="bg-white text-black p-3.5 rounded-xl receipt-font text-[11px] space-y-2 border border-slate-300 font-bold">
                                    <div className="text-center font-extrabold">
                                        <p className="text-xs uppercase">{storeInfo.storeName || 'VELO MART'}</p>
                                        <p className="font-semibold text-[9.5px]">{storeInfo.address}</p>
                                        <p className="tracking-tighter">------------------------------</p>
                                    </div>
                                    <div className="space-y-0.5 text-[9.5px]">
                                        <p>No TRX : {lastCompletedTx.transactionNo}</p>
                                        <p>Tgl    : {new Date(lastCompletedTx.createdAt).toLocaleString('id-ID')}</p>
                                        <p className="tracking-tighter">------------------------------</p>
                                    </div>
                                    <div className="space-y-1.5 text-[11px]">
                                        {lastCompletedTx.items.map((item, i) => (
                                            <div key={i}>
                                                <p className="font-extrabold">{item.name}</p>
                                                <div className="flex justify-between text-[10px]">
                                                    <span>{item.qty} x {item.price.toLocaleString('id-ID')}</span>
                                                    <span className="font-black">Rp {item.subtotal.toLocaleString('id-ID')}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="pt-1 text-[11px] space-y-0.5">
                                        <p className="tracking-tighter">------------------------------</p>
                                        <div className="flex justify-between font-black text-xs">
                                            <span>TOTAL</span><span>Rp {lastCompletedTx.total.toLocaleString('id-ID')}</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => window.print()} className="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-bold flex items-center justify-center gap-1 shadow-lg">
                                        <i data-lucide="printer" className="w-4 h-4"></i> Cetak
                                    </button>
                                    <button onClick={() => setIsReceiptModalOpen(false)} className="py-2.5 px-4 bg-slate-800 text-slate-300 rounded-xl text-xs font-bold">Selesai</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
