                background: white !important;

<body class="bg-slate-950 text-white font-sans antialiased selection:bg-indigo-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        function processImageUrl(url) {
            if (!url || typeof url !== 'string') return '';
            let cleanUrl = url.trim();
            if (!cleanUrl) return '';
            if (cleanUrl.startsWith('data:image/')) return cleanUrl;
            if (cleanUrl.includes('drive.google.com') && cleanUrl.includes('/file/d/')) {
                const idMatch = cleanUrl.match(/\/file\/d\/([^\/]+)/);
                if (idMatch && idMatch[1]) cleanUrl = `https://drive.google.com/uc?export=view&id=${idMatch[1]}`;
            }
            if (cleanUrl.includes('dropbox.com')) cleanUrl = cleanUrl.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('?dl=0', '');
            if (cleanUrl.startsWith('http://')) cleanUrl = cleanUrl.replace('http://', 'https://');
            return cleanUrl;
        }

        function ProductImage({ src, alt, className }) {
            const [imgState, setImgState] = useState('loading');
            const [currentSrc, setCurrentSrc] = useState('');

            useEffect(() => {
                const processed = processImageUrl(src);
                if (!processed) { setImgState('empty'); return; }
                setCurrentSrc(processed);
                setImgState('loading');
            }, [src]);

            const handleError = () => {
                if (imgState === 'loading' && currentSrc && !currentSrc.startsWith('data:')) {
                    const rawUrl = currentSrc.replace(/^https?:\/\//, '');
                    setCurrentSrc(`https://images.weserv.nl/?url=${encodeURIComponent(rawUrl)}`);
                    setImgState('proxy');
                } else {
                    setImgState('error');
                }
            };

            if (imgState === 'empty' || imgState === 'error') {
                return (
                    <div className={`flex items-center justify-center bg-slate-900 text-slate-500 ${className}`}>
                        <i data-lucide="package" className="w-6 h-6 opacity-60"></i>
                    </div>
                );
            }

            return (
                <img 
                    src={currentSrc} 
                    alt={alt || "Foto Produk"} 
                    className={`${className} object-cover`}
                    onLoad={() => setImgState('success')}
                    onError={handleError}
                />
            );
        }

        function playBeepSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(1000, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {
                console.log("Audio error:", e);
            }
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCk2xwtT9BGIEm520yJqfkSTDED1mOmt4M",
            authDomain: "fpos-8da84.firebaseapp.com",
            databaseURL: "https://fpos-8da84-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "fpos-8da84",
            storageBucket: "fpos-8da84.firebasestorage.app",
            messagingSenderId: "310532014571",
            appId: "1:310532014571:web:9e6867526d0f8ff7e759ae",
            measurementId: "G-GQKDLELR0P"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const firebaseDb = firebase.database();

        const db = new Dexie("VeloPOSProDB");
        db.version(3).stores({
            products: 'id, name, barcode, sku, category, costPrice, sellingPrice, stock, minStock, expiredDate, totalSold, lastSoldDate, imageUrl',
            categories: '++id, name',
            transactions: '++id, transactionNo, total, totalCost, profit, paymentMethod, cashierName, customerName, createdAt',
            settings: 'id, storeName, address, phone, receiptFooter'
        });

        function formatDateLocal(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        async function initSampleData() {
            const count = await db.products.count();
            if (count === 0) {
                const today = new Date();
                const expSoon = new Date(today.getTime() + (7 * 24 * 60 * 60 * 1000)).toISOString().split('T')[0];
                const expFar = new Date(today.getTime() + (180 * 24 * 60 * 60 * 1000)).toISOString().split('T')[0];
                
                await db.categories.bulkAdd([
                    { name: 'Makanan' },
                    { name: 'Minuman' },
                    { name: 'Sembako' },
                    { name: 'Kebutuhan' }
                ]);

                await db.products.bulkAdd([
                    { id: '1', name: 'Indomie Goreng Spesial 85g', barcode: '089686010018', sku: 'IND-01', category: 'Makanan', costPrice: 2800, sellingPrice: 3500, stock: 15, minStock: 10, expiredDate: expSoon, totalSold: 142, lastSoldDate: '2026-07-22', imageUrl: '' },
                    { id: '2', name: 'Aqua Air Mineral 600ml', barcode: '888600810105', sku: 'AQU-02', category: 'Minuman', costPrice: 2500, sellingPrice: 4000, stock: 85, minStock: 15, expiredDate: expFar, totalSold: 210, lastSoldDate: '2026-07-22', imageUrl: '' },
                    { id: '3', name: 'Susu Ultra Milk Cokelat 250ml', barcode: '899100110022', sku: 'ULT-01', category: 'Minuman', costPrice: 5500, sellingPrice: 7000, stock: 8, minStock: 10, expiredDate: expSoon, totalSold: 88, lastSoldDate: '2026-07-20', imageUrl: '' },
                    { id: '4', name: 'Minyak Goreng Bimoli 1L', barcode: '899200110055', sku: 'BIM-01', category: 'Sembako', costPrice: 16000, sellingPrice: 19500, stock: 25, minStock: 5, expiredDate: expFar, totalSold: 45, lastSoldDate: '2026-07-15', imageUrl: '' }
                ]);

                await db.settings.put({
                    id: 'store_info',
                    storeName: 'VELO MART MINIMARKET',
                    address: 'Jl. Pemuda No. 88, Jakarta',
                    phone: '081234567890',
                    receiptFooter: 'Terima Kasih Atas Kunjungan Anda\nBarang Yang Sudah Dibeli Tidak Dapat Ditukar'
                });
            }
        }

        function App() {
            const [activeTab, setActiveTab] = useState('pos');
            const [products, setProducts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [storeInfo, setStoreInfo] = useState({});
            
            const [isBackingUp, setIsBackingUp] = useState(false);
            const [lastBackupTime, setLastBackupTime] = useState(localStorage.getItem('last_backup_time') || null);

            const [datePreset, setDatePreset] = useState('ALL');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');

            const [cart, setCart] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            
            const [isScannerOpen, setIsScannerOpen] = useState(false);
            const [isVisualScanOpen, setIsVisualScanOpen] = useState(false);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiDetectedName, setAiDetectedName] = useState('');
            
            const visualVideoRef = useRef(null);
            const visualStreamRef = useRef(null);
            const html5QrCodeRef = useRef(null);
            const aiModelRef = useRef(null);

            const [isPaymentModalOpen, setIsPaymentModalOpen] = useState(false);
            const [paymentMethod, setPaymentMethod] = useState('CASH');
            const [cashPaid, setCashPaid] = useState('');
            const [cashierInput, setCashierInput] = useState('');
            const [customerInput, setCustomerInput] = useState('');
            const [lastCompletedTx, setLastCompletedTx] = useState(null);
            const [isReceiptModalOpen, setIsReceiptModalOpen] = useState(false);

            const [isProductModalOpen, setIsProductModalOpen] = useState(false);
            const [imageInputMode, setImageInputMode] = useState('file');
            const [newCategoryInput, setNewCategoryInput] = useState('');
            const [isAddingNewCategory, setIsAddingNewCategory] = useState(false);
            const [productForm, setProductForm] = useState({
                id: '', name: '', sku: '', barcode: '', category: 'Makanan',
                costPrice: 0, sellingPrice: 0, stock: 0, minStock: 5, expiredDate: '', imageUrl: ''
            });

            const salesChartRef = useRef(null);
            const topProductsChartRef = useRef(null);
            const chartInstanceRef = useRef({});

            useEffect(() => {
                initSampleData().then(() => refreshData());
            }, []);

            const refreshData = async () => {
                const p = await db.products.toArray();
                const c = await db.categories.toArray();
                const t = await db.transactions.toArray();
                const s = await db.settings.get('store_info');
                setProducts(p);
                setCategories(c);
                setTransactions(t);
                if (s) setStoreInfo(s);
            };

            const handleBackupToFirebase = async () => {
                setIsBackingUp(true);
                try {
                    const backupData = {
                        products: await db.products.toArray(),
                        categories: await db.categories.toArray(),
                        transactions: await db.transactions.toArray(),
                        settings: (await db.settings.get('store_info')) || {},
                        updatedAt: new Date().toISOString()
                    };
                    await firebaseDb.ref('pos_backup').set(backupData);
                    const nowStr = new Date().toLocaleString('id-ID');
                    setLastBackupTime(nowStr);
                    localStorage.setItem('last_backup_time', nowStr);
                    alert("✅ Berhasil! Data POS telah disinkronkan ke Firebase.");
                } catch (error) {
                    alert("❌ Gagal backup: " + error.message);
                } finally {
                    setIsBackingUp(false);
                }
            };

            useEffect(() => {
                if (isScannerOpen) {
                    setTimeout(() => {
                        const readerElem = document.getElementById("reader");
                        if (!readerElem) return;
                        const html5QrCode = new Html5Qrcode("reader");
                        html5QrCodeRef.current = html5QrCode;
                        html5QrCode.start(
                            { facingMode: "environment" },
                            { fps: 15, qrbox: { width: 250, height: 150 } },
                            (decodedText) => {
                                playBeepSound();
                                const found = products.find(p => p.barcode === decodedText || p.sku === decodedText);
                                if (found) {
                                    addToCart(found);
                                    setIsScannerOpen(false);
                                } else {
                                    alert(`Barcode "${decodedText}" tidak ditemukan!`);
                                    setIsScannerOpen(false);
                                }
                            },
                            () => {}
                        ).catch(() => setIsScannerOpen(false));
                    }, 300);
                } else {
                    if (html5QrCodeRef.current?.isScanning) {
                        html5QrCodeRef.current.stop().then(() => html5QrCodeRef.current.clear()).catch(() => {});
                    }
                }
            }, [isScannerOpen, products]);

            useEffect(() => {
                if (isVisualScanOpen) {
                    setAiDetectedName('');
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                        .then(stream => {
                            visualStreamRef.current = stream;
                            if (visualVideoRef.current) visualVideoRef.current.srcObject = stream;
                        })
                        .catch(() => setIsVisualScanOpen(false));
                } else {
                    visualStreamRef.current?.getTracks().forEach(t => t.stop());
                }
            }, [isVisualScanOpen]);

            const handleCaptureAndDetectAi = async () => {
                if (!visualVideoRef.current) return;
                setIsAiLoading(true);
                setAiDetectedName("Menganalisis objek produk...");
                try {
                    if (!aiModelRef.current) aiModelRef.current = await mobilenet.load();
                    const predictions = await aiModelRef.current.classify(visualVideoRef.current);
                    if (predictions?.length > 0) {
                        const topPrediction = predictions[0].className;
                        setAiDetectedName(`AI Prediksi: "${topPrediction}"`);
                        playBeepSound();
                        const matched = products.find(p => p.name.toLowerCase().includes(topPrediction.toLowerCase().split(',')[0])) || products[0];
                        if (matched) {
                            setTimeout(() => {
                                addToCart(matched);
                                setIsVisualScanOpen(false);
                                setIsAiLoading(false);
                            }, 500);
                        } else {
                            setIsAiLoading(false);
                        }
                    }
                } catch (e) {
                    setIsAiLoading(false);
                    alert("Gagal menjalankan AI Scan.");
                }
            };

            useEffect(() => {
                if (!searchQuery.trim()) { setSearchResults([]); return; }
                const q = searchQuery.toLowerCase();
                setSearchResults(products.filter(p => p.name.toLowerCase().includes(q) || p.barcode.includes(q) || p.sku.toLowerCase().includes(q)));
            }, [searchQuery, products]);

            const lowStockProducts = useMemo(() => products.filter(p => p.stock <= p.minStock), [products]);
            const expiredSoonProducts = useMemo(() => products.filter(p => {
                if (!p.expiredDate) return false;
                return Math.ceil((new Date(p.expiredDate) - new Date()) / (1000 * 60 * 60 * 24)) <= 30;
            }), [products]);

            const handleApplyPreset = (presetKey) => {
                setDatePreset(presetKey);
                const now = new Date();
                if (presetKey === 'TODAY') {
                    const s = formatDateLocal(now);
                    setStartDate(s); setEndDate(s);
                } else if (presetKey === 'LAST_7') {
                    const past = new Date(now); past.setDate(now.getDate() - 6);
                    setStartDate(formatDateLocal(past)); setEndDate(formatDateLocal(now));
                } else if (presetKey === 'ALL') {
                    setStartDate(''); setEndDate('');
                }
            };

            const filteredTransactions = useMemo(() => {
                return transactions.filter(t => {
                    const txDate = new Date(t.createdAt).toISOString().split('T')[0];
                    if (startDate && txDate < startDate) return false;
                    if (endDate && txDate > endDate) return false;
                    return true;
                });
            }, [transactions, startDate, endDate]);

            const exportToExcel = () => {
                if (filteredTransactions.length === 0) { alert("Tidak ada data!"); return; }
                const excelData = filteredTransactions.map((t, idx) => ({
                    "No": idx + 1, "No TRX": t.transactionNo, "Waktu": new Date(t.createdAt).toLocaleString('id-ID'),
                    "Kasir": t.cashierName || '-', "Total Omzet": t.total, "Profit": t.profit || 0
                }));
                const ws = XLSX.utils.json_to_sheet(excelData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Laporan");
                XLSX.writeFile(wb, "Laporan_Keuangan_VeloPOS.xlsx");
            };

            const addToCart = useCallback((product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.product.id === product.id);
                    if (existing) return prev.map(item => item.product.id === product.id ? { ...item, qty: item.qty + 1 } : item);
                    return [...prev, { product, qty: 1 }];
                });
                setSearchQuery(''); setSearchResults([]);
            }, []);

            const updateCartQty = useCallback((id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.product.id === id) {
                        const newQty = item.qty + delta;
                        return newQty > 0 ? { ...item, qty: newQty } : null;
                    }
                    return item;
                }).filter(Boolean));
            }, []);

            const grandTotal = useMemo(() => cart.reduce((a, b) => a + (b.product.sellingPrice * b.qty), 0), [cart]);
            const totalCartCost = useMemo(() => cart.reduce((a, b) => a + ((b.product.costPrice || 0) * b.qty), 0), [cart]);

            const handleCompletePayment = async () => {
                const paid = parseFloat(cashPaid) || grandTotal;
                if (paymentMethod === 'CASH' && paid < grandTotal) { alert("Pembayaran kurang!"); return; }

                const newTx = {
                    transactionNo: 'TRX-' + Date.now().toString().slice(-8),
                    items: cart.map(c => ({ id: c.product.id, name: c.product.name, costPrice: c.product.costPrice || 0, price: c.product.sellingPrice, qty: c.qty, subtotal: c.product.sellingPrice * c.qty })),
                    total: grandTotal, totalCost: totalCartCost, profit: grandTotal - totalCartCost,
                    paid, change: paid - grandTotal, paymentMethod, cashierName: cashierInput.trim(), customerName: customerInput.trim(),
                    createdAt: new Date().toISOString()
                };

                await db.transaction('rw', [db.products, db.transactions], async () => {
                    await db.transactions.add(newTx);
                    for (const item of cart) {
                        const prod = await db.products.get(item.product.id);
                        if (prod) {
                            await db.products.update(item.product.id, {
                                stock: Math.max(0, prod.stock - item.qty),
                                totalSold: (prod.totalSold || 0) + item.qty,
                                lastSoldDate: new Date().toISOString().split('T')[0]
                            });
                        }
                    }
                });

                setLastCompletedTx(newTx);
                setCart([]);
                setIsPaymentModalOpen(false);
                setIsReceiptModalOpen(true);
                setCashPaid('');
                refreshData();
            };

            const handleSaveProduct = async (e) => {
                e.preventDefault();
                await db.products.put({
                    ...productForm,
                    costPrice: parseFloat(productForm.costPrice) || 0,
                    sellingPrice: parseFloat(productForm.sellingPrice) || 0,
                    stock: parseInt(productForm.stock) || 0,
                    minStock: parseInt(productForm.minStock) || 0
                });
                setIsProductModalOpen(false);
                refreshData();
            };

            useEffect(() => {
                if (activeTab === 'dashboard' && salesChartRef.current && topProductsChartRef.current) {
                    if (chartInstanceRef.current.sales) chartInstanceRef.current.sales.destroy();
                    if (chartInstanceRef.current.top) chartInstanceRef.current.top.destroy();

                    chartInstanceRef.current.sales = new Chart(salesChartRef.current.getContext('2d'), {
                        type: 'line',
                        data: {
                            labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
                            datasets: [{ data: [1200000, 1900000, 1500000, 2200000, 2800000, 3500000, 3100000], borderColor: '#818cf8', fill: true, tension: 0.4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });

                    const sortedTop = [...products].sort((a, b) => b.totalSold - a.totalSold).slice(0, 5);
                    chartInstanceRef.current.top = new Chart(topProductsChartRef.current.getContext('2d'), {
                        type: 'bar',
                        data: {
                            labels: sortedTop.map(p => p.name.slice(0, 10)),
                            datasets: [{ data: sortedTop.map(p => p.totalSold), backgroundColor: '#10b981' }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }
            }, [activeTab, products]);

            useEffect(() => { setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100); });

            return (
                <div className="flex flex-col md:flex-row h-screen w-screen overflow-hidden bg-slate-950 text-white">
                    <aside className="hidden md:flex flex-col w-64 bg-slate-900 border-r border-slate-800 p-4 justify-between">
                        <div>
                            <div className="flex items-center gap-3 px-2 py-3 mb-6">
                                <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center font-black text-xl shadow-lg">V</div>
                                <div>
                                    <h1 className="font-bold text-base leading-none">VeloPOS Pro</h1>
                                    <span className="text-[10px] text-emerald-400 font-semibold">● Production Ready</span>
                                </div>
                            </div>
                            <nav className="space-y-1.5">
                                {[
                                    { id: 'dashboard', label: '🏠 Dashboard' },
                                    { id: 'pos', label: '🛒 POS Kasir' },
                                    { id: 'products', label: '📦 Menu Produk' },
                                    { id: 'reports', label: '📊 Laporan' },
                                    { id: 'settings', label: '⚙ Setting' }
                                ].map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow' : 'text-slate-300 hover:bg-slate-800'}`}>
                                        {tab.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                        <div className="space-y-2">
                            <button onClick={handleBackupToFirebase} disabled={isBackingUp} className="w-full py-2.5 bg-indigo-600/20 hover:bg-indigo-600 border border-indigo-500/50 text-indigo-300 hover:text-white rounded-xl text-xs font-bold transition">
                                {isBackingUp ? 'Syncing...' : 'Backup Cloud'}
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-full overflow-hidden relative">
                        {activeTab === 'dashboard' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-6 pb-24 md:pb-6">
                                <h2 className="text-2xl font-black">Dashboard</h2>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
                                    <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                                        <p className="text-xs text-slate-400 font-bold">Total Omzet</p>
                                        <p className="text-lg font-black text-indigo-300 mt-1">Rp {transactions.reduce((a, b) => a + b.total, 0).toLocaleString('id-ID')}</p>
                                    </div>
                                    <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                                        <p className="text-xs text-slate-400 font-bold">Profit</p>
                                        <p className="text-lg font-black text-emerald-300 mt-1">Rp {transactions.reduce((a, b) => a + (b.profit || 0), 0).toLocaleString('id-ID')}</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800 h-64"><canvas ref={salesChartRef}></canvas></div>
                                    <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800 h-64"><canvas ref={topProductsChartRef}></canvas></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'pos' && (
                            <div className="flex flex-col lg:flex-row h-full overflow-hidden pb-16 md:pb-0">
                                <div className="flex-1 flex flex-col p-4 overflow-hidden">
                                    <div className="flex gap-2 mb-4">
                                        <input 
                                            type="text" 
                                            placeholder="Cari produk / scan..." 
                                            value={searchQuery} 
                                            onChange={e => setSearchQuery(e.target.value)}
                                            className="flex-1 bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3 text-xs font-semibold focus:outline-none focus:ring-1 focus:ring-indigo-500"
                                        />
                                        <button onClick={() => setIsScannerOpen(!isScannerOpen)} className="px-3 bg-slate-900 border border-slate-800 rounded-2xl text-xs font-bold text-indigo-300">Barcode</button>
                                        <button onClick={() => setIsVisualScanOpen(true)} className="px-3 bg-indigo-600 rounded-2xl text-xs font-bold">AI Scan</button>
                                    </div>

                                    {isScannerOpen && (
                                        <div className="mb-4 bg-slate-900 p-3 rounded-2xl border border-indigo-500">
                                            <div id="reader" className="h-44 rounded-xl overflow-hidden bg-black"></div>
                                        </div>
                                    )}

                                    {searchResults.length > 0 && (
                                        <div className="mb-4 bg-slate-900 border border-slate-800 rounded-2xl max-h-48 overflow-y-auto z-30">
                                            {searchResults.map(p => (
                                                <div key={p.id} onClick={() => addToCart(p)} className="p-3 hover:bg-indigo-600/20 cursor-pointer flex justify-between text-xs border-b border-slate-800">
                                                    <span className="font-bold">{p.name}</span>
                                                    <span className="text-indigo-300 font-black">Rp {p.sellingPrice.toLocaleString('id-ID')}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    <div className="flex-1 overflow-y-auto">
                                        <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-3">
                                            {products.map(p => (
                                                <div key={p.id} onClick={() => addToCart(p)} className="bg-slate-900 hover:border-indigo-500 border border-slate-800 p-3 rounded-2xl cursor-pointer flex flex-col justify-between">
                                                    <div className="h-16 bg-slate-950 rounded-xl mb-2 overflow-hidden">
                                                        <ProductImage src={p.imageUrl} alt={p.name} className="w-full h-full" />
                                                    </div>
                                                    <p className="font-bold text-xs line-clamp-2">{p.name}</p>
                                                    <div className="mt-2 flex justify-between text-[10px]">
                                                        <span className="text-slate-400">Stok: {p.stock}</span>
                                                        <span className="font-black text-indigo-300">Rp {p.sellingPrice.toLocaleString('id-ID')}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="w-full lg:w-96 bg-slate-900 border-l border-slate-800 flex flex-col justify-between p-4">
                                    <div>
                                        <h3 className="font-bold text-sm mb-3">Keranjang Belanja</h3>
                                        <div className="space-y-2 max-h-72 overflow-y-auto">
                                            {cart.length === 0 ? <p className="text-xs text-slate-500 text-center py-6">Keranjang Kosong</p> : cart.map(({ product, qty }) => (
                                                <div key={product.id} className="p-2.5 bg-slate-950 rounded-xl flex justify-between items-center text-xs">
                                                    <div>
                                                        <p className="font-bold truncate max-w-[120px]">{product.name}</p>
                                                        <p className="text-indigo-300 font-black">Rp {(product.sellingPrice * qty).toLocaleString('id-ID')}</p>
                                                    </div>
                                                    <div className="flex items-center gap-1.5">
                                                        <button onClick={() => updateCartQty(product.id, -1)} className="w-6 h-6 bg-slate-800 rounded font-bold">-</button>
                                                        <span className="w-4 text-center font-bold">{qty}</span>
                                                        <button onClick={() => updateCartQty(product.id, 1)} className="w-6 h-6 bg-slate-800 rounded font-bold">+</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="pt-3 border-t border-slate-800 space-y-3">
                                        <div className="flex justify-between font-extrabold text-sm">
                                            <span>Total</span>
                                            <span className="text-indigo-300 font-black">Rp {grandTotal.toLocaleString('id-ID')}</span>
                                        </div>
                                        <button disabled={cart.length === 0} onClick={() => setIsPaymentModalOpen(true)} className="w-full py-3 bg-indigo-600 disabled:bg-slate-800 rounded-xl font-bold text-xs shadow">Bayar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'products' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-4 pb-24 md:pb-6">
                                <div className="flex justify-between">
                                    <h2 className="text-2xl font-black">Daftar Produk</h2>
                                    <button onClick={() => { setProductForm({ id: 'P-' + Date.now().toString().slice(-6), name: '', sku: '', barcode: '', category: 'Makanan', costPrice: 0, sellingPrice: 0, stock: 10, minStock: 5, expiredDate: '', imageUrl: '' }); setIsProductModalOpen(true); }} className="px-4 py-2 bg-indigo-600 rounded-xl text-xs font-bold">Tambah Produk</button>
                                </div>
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
                                    <table className="w-full text-left text-xs">
                                        <thead className="bg-slate-950 text-slate-400">
                                            <tr>
                                                <th className="p-3">Nama</th><th className="p-3">SKU</th><th className="p-3">Harga Jual</th><th className="p-3">Stok</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800">
                                            {products.map(p => (
                                                <tr key={p.id}>
                                                    <td className="p-3 font-bold">{p.name}</td>
                                                    <td className="p-3 font-mono">{p.sku}</td>
                                                    <td className="p-3 text-indigo-300 font-bold">Rp {p.sellingPrice.toLocaleString('id-ID')}</td>
                                                    <td className="p-3">{p.stock}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'reports' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-4 pb-24 md:pb-6">
                                <div className="flex justify-between">
                                    <h2 className="text-2xl font-black">Laporan</h2>
                                    <button onClick={exportToExcel} className="px-4 py-2 bg-emerald-600 rounded-xl text-xs font-bold">Ekspor Excel</button>
                                </div>
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
                                    <table className="w-full text-left text-xs">
                                        <thead className="bg-slate-950 text-slate-400">
                                            <tr><th className="p-3">No TRX</th><th className="p-3">Waktu</th><th className="p-3">Total</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800">
                                            {transactions.map(t => (
                                                <tr key={t.id}>
                                                    <td className="p-3 font-mono text-indigo-300">{t.transactionNo}</td>
                                                    <td className="p-3">{new Date(t.createdAt).toLocaleString('id-ID')}</td>
                                                    <td className="p-3 font-black">Rp {t.total.toLocaleString('id-ID')}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="p-4 md:p-6 space-y-4">
                                <h2 className="text-2xl font-black">Setting Toko</h2>
                                <div className="bg-slate-900 border border-slate-800 p-5 rounded-2xl max-w-lg space-y-3">
                                    <input type="text" value={storeInfo.storeName || ''} onChange={e => setStoreInfo({...storeInfo, storeName: e.target.value})} className="w-full bg-slate-950 p-2.5 rounded-xl text-xs border border-slate-800"/>
                                    <button onClick={async () => { await db.settings.put({...storeInfo, id: 'store_info'}); alert("Disimpan!"); }} className="px-4 py-2 bg-indigo-600 rounded-xl text-xs font-bold">Simpan</button>
                                </div>
                            </div>
                        )}

                        <div className="md:hidden fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around p-2 z-50">
                            {['dashboard', 'pos', 'products', 'reports', 'settings'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`text-[10px] ${activeTab === tab ? 'text-indigo-400 font-bold' : 'text-slate-400'}`}>
                                    {tab.toUpperCase()}
                                </button>
                            ))}
                        </div>
                    </main>

                    {isProductModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-md rounded-3xl p-5 space-y-3">
                                <h3 className="font-bold text-sm">Produk Baru</h3>
                                <form onSubmit={handleSaveProduct} className="space-y-2 text-xs">
                                    <input type="text" required placeholder="Nama Produk" value={productForm.name} onChange={e => setProductForm({...productForm, name: e.target.value})} className="w-full bg-slate-950 p-2.5 rounded-xl border border-slate-800"/>
                                    <input type="number" required placeholder="Harga Jual" value={productForm.sellingPrice} onChange={e => setProductForm({...productForm, sellingPrice: e.target.value})} className="w-full bg-slate-950 p-2.5 rounded-xl border border-slate-800"/>
                                    <button type="submit" className="w-full py-2.5 bg-indigo-600 rounded-xl font-bold">Simpan</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {isVisualScanOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-3xl p-5 space-y-4 text-center">
                                <h3 className="font-bold text-sm">Visual AI Scan</h3>
                                <div className="border border-indigo-500 rounded-2xl overflow-hidden bg-black h-48 relative">
                                    <video ref={visualVideoRef} autoPlay playsInline muted className="w-full h-full object-cover"></video>
                                    {isAiLoading && <div className="absolute inset-0 bg-black/70 flex items-center justify-center text-xs text-indigo-300">Memproses...</div>}
                                </div>
                                {aiDetectedName && <p className="text-xs text-emerald-400 font-bold">{aiDetectedName}</p>}
                                <button onClick={handleCaptureAndDetectAi} className="w-full py-2.5 bg-indigo-600 rounded-xl text-xs font-bold">Deteksi AI</button>
                                <button onClick={() => setIsVisualScanOpen(false)} className="w-full py-2 bg-slate-800 rounded-xl text-xs font-bold">Tutup</button>
                            </div>
                        </div>
                    )}

                    {isPaymentModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-3xl p-5 space-y-4">
                                <h3 className="font-bold text-sm">Pembayaran</h3>
                                <input type="number" placeholder="Uang Diterima" value={cashPaid} onChange={e => setCashPaid(e.target.value)} className="w-full bg-slate-950 p-3 rounded-xl border border-slate-800 font-black text-lg"/>
                                <div className="flex gap-2">
                                    <button onClick={() => setIsPaymentModalOpen(false)} className="flex-1 py-2.5 bg-slate-800 rounded-xl text-xs font-bold">Batal</button>
                                    <button onClick={handleCompletePayment} className="flex-1 py-2.5 bg-indigo-600 rounded-xl text-xs font-bold">Bayar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isReceiptModalOpen && lastCompletedTx && (
                        <div className="fixed inset-0 bg-slate-950/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-xs rounded-3xl p-5 space-y-4">
                                <div id="receipt-print-area" className="bg-white text-black p-3 rounded-xl receipt-font text-[10px] space-y-1">
                                    <div className="text-center font-bold">
                                        <p className="text-xs uppercase">{storeInfo.storeName || 'VELO MART'}</p>
                                        <p>{storeInfo.address}</p>
                                    </div>
                                    <p>--------------------------------</p>
                                    {lastCompletedTx.items.map((it, idx) => (
                                        <div key={idx} className="flex justify-between">
                                            <span>{it.qty}x {it.name}</span>
                                            <span>Rp {it.subtotal.toLocaleString('id-ID')}</span>
                                        </div>
                                    ))}
                                    <p>--------------------------------</p>
                                    <div className="flex justify-between font-bold text-xs">
                                        <span>TOTAL</span>
                                        <span>Rp {lastCompletedTx.total.toLocaleString('id-ID')}</span>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => window.print()} className="flex-1 py-2.5 bg-indigo-600 rounded-xl text-xs font-bold">Cetak</button>
                                    <button onClick={() => setIsReceiptModalOpen(false)} className="py-2.5 px-4 bg-slate-800 rounded-xl text-xs font-bold">Selesai</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
