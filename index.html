        function processImageUrl(url) {
            if (!url || typeof url !== 'string') return '';
            let cleanUrl = url.trim();

            if (!cleanUrl) return '';

            if (cleanUrl.startsWith('data:image/')) {
                return cleanUrl;
            }

            if (cleanUrl.includes('drive.google.com') && cleanUrl.includes('/file/d/')) {
                const idMatch = cleanUrl.match(/\/file\/d\/([^\/]+)/);
                if (idMatch && idMatch[1]) {
                    cleanUrl = `https://drive.google.com/uc?export=view&id=${idMatch[1]}`;
                }
            }

            if (cleanUrl.includes('dropbox.com')) {
                cleanUrl = cleanUrl.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('?dl=0', '');
            }

            if (cleanUrl.startsWith('http://')) {
                cleanUrl = cleanUrl.replace('http://', 'https://');
            }

            return cleanUrl;
        }

        function ProductImage({ src, alt, className }) {
            const [imgState, setImgState] = useState('loading');
            const [currentSrc, setCurrentSrc] = useState('');

            useEffect(() => {
                const processed = processImageUrl(src);
                if (!processed) {
                    setImgState('empty');
                    return;
                }
                setCurrentSrc(processed);
                setImgState('loading');
            }, [src]);

            const handleError = () => {
                if (imgState === 'loading' && currentSrc && !currentSrc.startsWith('data:')) {
                    const rawUrl = currentSrc.replace(/^https?:\/\//, '');
                    setCurrentSrc(`https://images.weserv.nl/?url=${encodeURIComponent(rawUrl)}`);
                    setImgState('proxy');
                } else {
                    setImgState('error');
                }
            };

            if (imgState === 'empty' || imgState === 'error') {
                return (
                    <div className={`flex items-center justify-center bg-slate-900 text-slate-500 ${className}`}>
                        <i data-lucide="package" className="w-8 h-8 opacity-60"></i>
                    </div>
                );
            }

            return (
                <img 
                    src={currentSrc} 
                    alt={alt || "Foto Produk"} 
                    className={`${className} object-cover`}
                    onLoad={() => setImgState('success')}
                    onError={handleError}
                />
            );
        }

        function playBeepSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(1000, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {
                console.log("Audio Context error:", e);
            }
        }

        function App() {
            const [activeTab, setActiveTab] = useState('pos');
            const [products, setProducts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [storeInfo, setStoreInfo] = useState({});
            
            const [isBackingUp, setIsBackingUp] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [lastBackupTime, setLastBackupTime] = useState(localStorage.getItem('last_backup_time') || null);

            const [datePreset, setDatePreset] = useState('ALL');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');

            const [cart, setCart] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            
            const [isScannerOpen, setIsScannerOpen] = useState(false);
            const [isVisualScanOpen, setIsVisualScanOpen] = useState(false);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiDetectedName, setAiDetectedName] = useState('');
            
            const visualVideoRef = useRef(null);
            const visualStreamRef = useRef(null);
            const html5QrCodeRef = useRef(null);
            const aiModelRef = useRef(null);

            const [isPaymentModalOpen, setIsPaymentModalOpen] = useState(false);
            const [paymentMethod, setPaymentMethod] = useState('CASH');
            const [cashPaid, setCashPaid] = useState('');
            const [cashierInput, setCashierInput] = useState('');
            const [customerInput, setCustomerInput] = useState('');
            const [lastCompletedTx, setLastCompletedTx] = useState(null);
            const [isReceiptModalOpen, setIsReceiptModalOpen] = useState(false);

            const [isProductModalOpen, setIsProductModalOpen] = useState(false);
            const [imageInputMode, setImageInputMode] = useState('file');
            const [newCategoryInput, setNewCategoryInput] = useState('');
            const [isAddingNewCategory, setIsAddingNewCategory] = useState(false);
            const [productForm, setProductForm] = useState({
                id: '', name: '', sku: '', barcode: '', category: 'Makanan', costPrice: 0, sellingPrice: 0, stock: 0, minStock: 5, expiredDate: '', imageUrl: ''
            });

            const salesChartRef = useRef(null);
            const topProductsChartRef = useRef(null);
            const chartInstanceRef = useRef({});

            // ----------------------------------------------------------------------
            // FUNGSI SINKRONISASI DATA REALTIME (FIREBASE -> INDEXEDDB)
            // ----------------------------------------------------------------------
            const syncFromFirebase = async (cloudData) => {
                if (!cloudData) return;
                setIsSyncing(true);
                try {
                    await db.transaction('rw', [db.products, db.categories, db.transactions, db.settings], async () => {
                        if (cloudData.products && Array.isArray(cloudData.products)) {
                            await db.products.clear();
                            await db.products.bulkPut(cloudData.products);
                        }
                        if (cloudData.categories && Array.isArray(cloudData.categories)) {
                            await db.categories.clear();
                            await db.categories.bulkPut(cloudData.categories);
                        }
                        if (cloudData.transactions && Array.isArray(cloudData.transactions)) {
                            await db.transactions.clear();
                            await db.transactions.bulkPut(cloudData.transactions);
                        }
                        if (cloudData.settings && typeof cloudData.settings === 'object') {
                            await db.settings.put({ ...cloudData.settings, id: 'store_info' });
                        }
                    });

                    if (cloudData.updatedAt) {
                        const formatted = new Date(cloudData.updatedAt).toLocaleString('id-ID');
                        setLastBackupTime(formatted);
                        localStorage.setItem('last_backup_time', formatted);
                    }
                    await refreshData();
                } catch (err) {
                    console.error("Sinkronisasi gagal:", err);
                } finally {
                    setIsSyncing(false);
                }
            };

            // Inisialisasi awal + Listener Realtime dari Cloud Firebase
            useEffect(() => {
                initSampleData().then(() => {
                    refreshData();
                    
                    // Pasang listener realtime agar jika device lain menekan backup, device ini otomatis update
                    const backupRef = firebaseDb.ref('pos_backup');
                    backupRef.on('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            syncFromFirebase(data);
                        }
                    });
                });

                return () => {
                    firebaseDb.ref('pos_backup').off();
                };
            }, []);

            const refreshData = async () => {
                const p = await db.products.toArray();
                const c = await db.categories.toArray();
                const t = await db.transactions.toArray();
                const s = await db.settings.get('store_info');
                setProducts(p);
                setCategories(c);
                setTransactions(t);
                if (s) setStoreInfo(s);
            };

            const handleBackupToFirebase = async () => {
                setIsBackingUp(true);
                try {
                    const allProducts = await db.products.toArray();
                    const allCategories = await db.categories.toArray();
                    const allTransactions = await db.transactions.toArray();
                    const storeSetting = await db.settings.get('store_info');

                    const backupData = {
                        products: allProducts,
                        categories: allCategories,
                        transactions: allTransactions,
                        settings: storeSetting || {},
                        updatedAt: new Date().toISOString()
                    };

                    await firebaseDb.ref('pos_backup').set(backupData);

                    const nowStr = new Date().toLocaleString('id-ID');
                    setLastBackupTime(nowStr);
                    localStorage.setItem('last_backup_time', nowStr);

                    alert("✅ Berhasil! Data di-backup & disinkronkan ke seluruh perangkat terhubung.");
                } catch (error) {
                    alert("❌ Gagal backup: " + error.message);
                } finally {
                    setIsBackingUp(false);
                }
            };

            const handleRestoreFromFirebase = () => {
                setIsSyncing(true);
                firebaseDb.ref('pos_backup').once('value')
                    .then(snapshot => {
                        const data = snapshot.val();
                        if (data) {
                            syncFromFirebase(data);
                            alert("✅ Berhasil menarik & menyinkronkan data terbaru dari Cloud!");
                        } else {
                            alert("Data di Cloud Firebase masih kosong!");
                        }
                    })
                    .catch(err => {
                        alert("❌ Gagal mengambil data: " + err.message);
                    })
                    .finally(() => setIsSyncing(false));
            };

            useEffect(() => {
                if (isScannerOpen) {
                    setTimeout(() => {
                        const readerElem = document.getElementById("reader");
                        if (!readerElem) return;

                        const html5QrCode = new Html5Qrcode("reader");
                        html5QrCodeRef.current = html5QrCode;

                        html5QrCode.start(
                            { facingMode: "environment" },
                            { fps: 15, qrbox: { width: 250, height: 150 } },
                            (decodedText) => {
                                playBeepSound();
                                const found = products.find(p => p.barcode === decodedText || p.sku === decodedText);
                                if (found) {
                                    addToCart(found);
                                    setIsScannerOpen(false);
                                } else {
                                    alert(`Barcode "${decodedText}" tidak ditemukan di database!`);
                                    setIsScannerOpen(false);
                                }
                            },
                            () => {}
                        ).catch(err => {
                            alert("Kamera tidak dapat diakses!");
                            setIsScannerOpen(false);
                        });
                    }, 300);
                } else {
                    if (html5QrCodeRef.current && html5QrCodeRef.current.isScanning) {
                        html5QrCodeRef.current.stop().then(() => { html5QrCodeRef.current.clear(); }).catch(e => console.log(e));
                    }
                }
            }, [isScannerOpen, products]);

            useEffect(() => {
                if (isVisualScanOpen) {
                    setAiDetectedName('');
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                        .then(stream => {
                            visualStreamRef.current = stream;
                            if (visualVideoRef.current) {
                                visualVideoRef.current.srcObject = stream;
                            }
                        })
                        .catch(err => {
                            alert("Izin kamera ditolak!");
                            setIsVisualScanOpen(false);
                        });
                } else {
                    if (visualStreamRef.current) {
                        visualStreamRef.current.getTracks().forEach(track => track.stop());
                        visualStreamRef.current = null;
                    }
                }
            }, [isVisualScanOpen]);

            const handleCaptureAndDetectAi = async () => {
                if (!visualVideoRef.current) return;
                setIsAiLoading(true);
                setAiDetectedName("Menganalisis gambar dengan AI...");

                try {
                    if (!aiModelRef.current) {
                        aiModelRef.current = await mobilenet.load();
                    }

                    const predictions = await aiModelRef.current.classify(visualVideoRef.current);
                    
                    if (predictions && predictions.length > 0) {
                        const topPrediction = predictions[0].className;
                        setAiDetectedName(`AI Memprediksi: "${topPrediction}"`);
                        playBeepSound();

                        const keywords = topPrediction.toLowerCase().split(',').map(k => k.trim());
                        let matchedProduct = null;
                        for (let key of keywords) {
                            matchedProduct = products.find(p => p.name.toLowerCase().includes(key));
                            if (matchedProduct) break;
                        }

                        if (!matchedProduct && products.length > 0) {
                            matchedProduct = products[0];
                        }

                        if (matchedProduct) {
                            setTimeout(() => {
                                addToCart(matchedProduct);
                                setIsVisualScanOpen(false);
                                setIsAiLoading(false);
                                alert(`✨ Terdeteksi "${topPrediction}", menambahkan "${matchedProduct.name}" ke keranjang!`);
                            }, 600);
                        }
                    } else {
                        setIsAiLoading(false);
                    }
                } catch (error) {
                    setIsAiLoading(false);
                    alert("AI Scan Error: " + error.message);
                }
            };

            useEffect(() => {
                if (!searchQuery.trim()) {
                    setSearchResults([]);
                    return;
                }
                const q = searchQuery.toLowerCase();
                const filtered = products.filter(p => p.name.toLowerCase().includes(q) || p.barcode.includes(q) || p.sku.toLowerCase().includes(q));
                setSearchResults(filtered);
            }, [searchQuery, products]);

            const lowStockProducts = products.filter(p => p.stock <= p.minStock);
            const expiredSoonProducts = products.filter(p => {
                if (!p.expiredDate) return false;
                const diffDays = Math.ceil((new Date(p.expiredDate) - new Date()) / (1000 * 60 * 60 * 24));
                return diffDays <= 30;
            });

            const handleApplyPreset = (presetKey) => {
                setDatePreset(presetKey);
                const now = new Date();
                
                if (presetKey === 'TODAY') {
                    const todayStr = formatDateLocal(now);
                    setStartDate(todayStr);
                    setEndDate(todayStr);
                } else if (presetKey === 'YESTERDAY') {
                    const yesterday = new Date(now);
                    yesterday.setDate(now.getDate() - 1);
                    setStartDate(formatDateLocal(yesterday));
                    setEndDate(formatDateLocal(yesterday));
                } else if (presetKey === 'LAST_7') {
                    const sevenDaysAgo = new Date(now);
                    sevenDaysAgo.setDate(now.getDate() - 6);
                    setStartDate(formatDateLocal(sevenDaysAgo));
                    setEndDate(formatDateLocal(now));
                } else if (presetKey === 'LAST_30') {
                    const thirtyDaysAgo = new Date(now);
                    thirtyDaysAgo.setDate(now.getDate() - 29);
                    setStartDate(formatDateLocal(thirtyDaysAgo));
                    setEndDate(formatDateLocal(now));
                } else if (presetKey === 'ALL') {
                    setStartDate('');
                    setEndDate('');
                }
            };

            const filteredTransactions = transactions.filter(t => {
                const txDate = new Date(t.createdAt).toISOString().split('T')[0];
                if (startDate && txDate < startDate) return false;
                if (endDate && txDate > endDate) return false;
                return true;
            });

            const totalOmzetFilter = filteredTransactions.reduce((acc, t) => acc + t.total, 0);
            const totalHppFilter = filteredTransactions.reduce((acc, t) => acc + (t.totalCost || 0), 0);
            const totalProfitFilter = filteredTransactions.reduce((acc, t) => acc + (t.profit || 0), 0);

            const exportToExcel = () => {
                if (filteredTransactions.length === 0) {
                    alert("Tidak ada data transaksi!");
                    return;
                }
                const excelData = filteredTransactions.map((t, idx) => ({
                    "No": idx + 1, "No Transaksi": t.transactionNo, "Tanggal & Waktu": new Date(t.createdAt).toLocaleString('id-ID'),
                    "Kasir": t.cashierName || '-', "Pelanggan": t.customerName || '-', "Metode Pembayaran": t.paymentMethod,
                    "Total Omzet (Rp)": t.total, "Total HPP (Rp)": t.totalCost || 0, "Profit (Rp)": t.profit || 0
                }));
                const worksheet = XLSX.utils.json_to_sheet(excelData);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan Keuangan");
                XLSX.writeFile(workbook, `Laporan_Keuangan_${startDate || 'Semua'}.xlsx`);
            };

            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.product.id === product.id);
                    if (existing) {
                        return prev.map(item => item.product.id === product.id ? { ...item, qty: item.qty + 1 } : item);
                    }
                    return [...prev, { product, qty: 1 }];
                });
                setSearchQuery('');
                setSearchResults([]);
            };

            const updateCartQty = (id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.product.id === id) {
                        const newQty = item.qty + delta;
                        return newQty > 0 ? { ...item, qty: newQty } : null;
                    }
                    return item;
                }).filter(Boolean));
            };

            const grandTotal = cart.reduce((a, b) => a + (b.product.sellingPrice * b.qty), 0);
            const totalCartCost = cart.reduce((a, b) => a + ((b.product.costPrice || 0) * b.qty), 0);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => { setProductForm(prev => ({ ...prev, imageUrl: reader.result })); };
                    reader.readAsDataURL(file);
                }
            };

            const handleAddCategory = async () => {
                if (!newCategoryInput.trim()) return;
                await db.categories.add({ name: newCategoryInput.trim() });
                await refreshData();
                setProductForm(prev => ({ ...prev, category: newCategoryInput.trim() }));
                setNewCategoryInput('');
                setIsAddingNewCategory(false);
            };

            const handleCompletePayment = async () => {
                const paid = parseFloat(cashPaid) || grandTotal;
                if (paymentMethod === 'CASH' && paid < grandTotal) {
                    alert("Jumlah pembayaran kurang!");
                    return;
                }
                const newTx = {
                    transactionNo: 'TRX-' + Date.now().toString().slice(-8),
                    items: cart.map(c => ({ id: c.product.id, name: c.product.name, price: c.product.sellingPrice, qty: c.qty, subtotal: c.product.sellingPrice * c.qty })),
                    total: grandTotal, totalCost: totalCartCost, profit: grandTotal - totalCartCost, paid: paid, change: paid - grandTotal, paymentMethod, cashierName: cashierInput.trim(), customerName: customerInput.trim(), createdAt: new Date().toISOString()
                };
                await db.transactions.add(newTx);
                for (const item of cart) {
                    const prod = await db.products.get(item.product.id);
                    if (prod) {
                        await db.products.update(item.product.id, { stock: Math.max(0, prod.stock - item.qty), totalSold: (prod.totalSold || 0) + item.qty });
                    }
                }
                setLastCompletedTx(newTx);
                setCart([]);
                setIsPaymentModalOpen(false);
                setIsReceiptModalOpen(true);
                setCashPaid('');
                refreshData();

                // Otomatis push ke Firebase agar perangkat lain ter-update
                setTimeout(() => {
                    handleBackupToFirebase();
                }, 500);
            };

            const handleOpenProductModal = (product = null) => {
                if (product) {
                    setProductForm(product);
                    setImageInputMode(product.imageUrl && product.imageUrl.startsWith('http') ? 'url' : 'file');
                } else {
                    setProductForm({
                        id: 'PROD-' + Date.now().toString().slice(-6), name: '', sku: 'SKU-' + Math.floor(100 + Math.random() * 900), barcode: Math.floor(100000000000 + Math.random() * 900000000000).toString(), category: categories[0]?.name || 'Makanan', costPrice: 0, sellingPrice: 0, stock: 10, minStock: 5, expiredDate: '', imageUrl: ''
                    });
                    setImageInputMode('file');
                }
                setIsProductModalOpen(true);
            };

            const handleSaveProduct = async (e) => {
                e.preventDefault();
                await db.products.put({
                    ...productForm, costPrice: parseFloat(productForm.costPrice) || 0, sellingPrice: parseFloat(productForm.sellingPrice) || 0, stock: parseInt(productForm.stock) || 0, minStock: parseInt(productForm.minStock) || 0
                });
                setIsProductModalOpen(false);
                refreshData();

                // Otomatis push ke Firebase
                setTimeout(() => {
                    handleBackupToFirebase();
                }, 500);
            };

            const handleDeleteProduct = async (id) => {
                if (confirm("Hapus produk ini?")) {
                    await db.products.delete(id);
                    refreshData();
                    setTimeout(() => {
                        handleBackupToFirebase();
                    }, 500);
                }
            };

            useEffect(() => {
                if (activeTab === 'dashboard' && salesChartRef.current && topProductsChartRef.current) {
                    if (chartInstanceRef.current.sales) chartInstanceRef.current.sales.destroy();
                    if (chartInstanceRef.current.top) chartInstanceRef.current.top.destroy();

                    chartInstanceRef.current.sales = new Chart(salesChartRef.current.getContext('2d'), {
                        type: 'line', data: { labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Ming'], datasets: [{ label: 'Penjualan', data: [1200000, 1900000, 1500000, 2200000, 2800000, 3500000, 3100000], borderColor: '#818cf8', backgroundColor: 'rgba(99, 102, 241, 0.15)', fill: true }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });

                    const sortedTop = [...products].sort((a, b) => b.totalSold - a.totalSold).slice(0, 5);
                    chartInstanceRef.current.top = new Chart(topProductsChartRef.current.getContext('2d'), {
                        type: 'bar', data: { labels: sortedTop.map(p => p.name.slice(0, 10)), datasets: [{ label: 'Terjual', data: sortedTop.map(p => p.totalSold), backgroundColor: '#10b981' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }
            }, [activeTab, products]);

            useEffect(() => { setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100); });

            return (
                <div className="flex flex-col md:flex-row h-screen w-screen overflow-hidden bg-slate-950 text-white">
                    <aside className="hidden md:flex flex-col w-64 bg-slate-900 border-r border-slate-800/80 p-4 justify-between">
                        <div>
                            <div className="flex items-center gap-3 px-2 py-3 mb-6">
                                <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center font-black text-xl shadow-lg text-white">V</div>
                                <div>
                                    <h1 className="font-bold text-white text-base leading-none">VeloPOS Pro</h1>
                                    <span className="text-[10px] text-emerald-400 font-semibold flex items-center gap-1 mt-1">
                                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                                        {isSyncing ? 'Sinkronisasi...' : 'Realtime Sync Active'}
                                    </span>
                                </div>
                            </div>

                            <nav className="space-y-1.5">
                                <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    <i data-lucide="layout-dashboard" className="w-5 h-5"></i> Dashboard
                                </button>
                                <button onClick={() => setActiveTab('pos')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'pos' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    <i data-lucide="shopping-cart" className="w-5 h-5"></i> POS Kasir
                                </button>
                                <button onClick={() => setActiveTab('products')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'products' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    <i data-lucide="box" className="w-5 h-5"></i> Produk
                                </button>
                                <button onClick={() => setActiveTab('reports')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'reports' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    <i data-lucide="file-text" className="w-5 h-5"></i> Laporan
                                </button>
                                <button onClick={() => setActiveTab('settings')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'settings' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    <i data-lucide="settings" className="w-5 h-5"></i> Setting
                                </button>
                            </nav>
                        </div>

                        <div className="space-y-3">
                            <button onClick={handleBackupToFirebase} disabled={isBackingUp} className="w-full py-2.5 px-3 bg-indigo-600/20 hover:bg-indigo-600 border border-indigo-500/50 text-indigo-300 hover:text-white rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition shadow">
                                <i data-lucide="cloud-upload" className="w-4 h-4"></i> {isBackingUp ? 'Memproses...' : 'Backup & Sinkronkan'}
                            </button>

                            {lastBackupTime && (
                                <p className="text-[10px] text-slate-400 text-center font-semibold">
                                    Sinkronisasi Terakhir:<br/>{lastBackupTime}
                                </p>
                            )}

                            {lowStockProducts.length > 0 && (
                                <div className="p-2.5 bg-amber-500/10 border border-amber-500/30 rounded-xl text-xs text-amber-300 font-semibold flex items-center gap-2">
                                    <span>⚠️</span> <span>{lowStockProducts.length} Produk Stok Habis</span>
                                </div>
                            )}
                            {expiredSoonProducts.length > 0 && (
                                <div className="p-2.5 bg-rose-500/10 border border-rose-500/30 rounded-xl text-xs text-rose-300 font-semibold flex items-center gap-2">
                                    <span>⌛</span> <span>{expiredSoonProducts.length} Produk Mau Expired</span>
                                </div>
                            )}
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-full overflow-hidden relative">
                        {activeTab === 'dashboard' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-6 pb-24 md:pb-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black text-white">Dashboard Penjualan</h2>
                                    <button onClick={handleBackupToFirebase} disabled={isBackingUp} className="md:hidden px-3 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold flex items-center gap-1.5 shadow">
                                        <i data-lucide="cloud-upload" className="w-4 h-4"></i> Backup
                                    </button>
                                </div>

                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4">
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                                        <p className="text-xs text-slate-400 uppercase font-bold">Total Omzet</p>
                                        <p className="text-lg md:text-xl font-black text-indigo-300 mt-1">Rp {transactions.reduce((a, t) => a + t.total, 0).toLocaleString('id-ID')}</p>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                                        <p className="text-xs text-slate-400 uppercase font-bold">Total HPP</p>
                                        <p className="text-lg md:text-xl font-black text-amber-300 mt-1">Rp {transactions.reduce((a, t) => a + (t.totalCost || 0), 0).toLocaleString('id-ID')}</p>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                                        <p className="text-xs text-slate-400 uppercase font-bold">Profit</p>
                                        <p className="text-lg md:text-xl font-black text-emerald-300 mt-1">Rp {transactions.reduce((a, t) => a + (t.profit || 0), 0).toLocaleString('id-ID')}</p>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                                        <p className="text-xs text-slate-400 uppercase font-bold">Total Transaksi</p>
                                        <p className="text-lg md:text-xl font-black text-sky-300 mt-1">{transactions.length} TRX</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl h-72">
                                        <h3 className="text-sm font-bold text-white mb-3">Grafik Penjualan</h3>
                                        <div className="h-56"><canvas ref={salesChartRef}></canvas></div>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl h-72">
                                        <h3 className="text-sm font-bold text-white mb-3">Produk Terlaris</h3>
                                        <div className="h-56"><canvas ref={topProductsChartRef}></canvas></div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-slate-900 border border-amber-500/30 p-4 rounded-2xl shadow-lg">
                                        <div className="flex justify-between items-center mb-3">
                                            <h3 className="text-sm font-bold text-amber-300 flex items-center gap-2">
                                                <span>⚠️</span> Barang Stok Menipis (Perlu Dibelanjakan)
                                            </h3>
                                            <span className="text-xs bg-amber-500/20 text-amber-300 px-2 py-0.5 rounded-full font-bold border border-amber-500/30">
                                                {lowStockProducts.length} Barang
                                            </span>
                                        </div>

                                        <div className="space-y-2 max-h-52 overflow-y-auto pr-1">
                                            {lowStockProducts.length === 0 ? (
                                                <p className="text-xs text-slate-400 text-center py-6 font-semibold">Semua stok barang aman/mencukupi 👍</p>
                                            ) : (
                                                lowStockProducts.map(p => (
                                                    <div key={p.id} className="p-2.5 bg-slate-950 border border-slate-800 rounded-xl flex justify-between items-center text-xs">
                                                        <div>
                                                            <p className="font-bold text-white">{p.name}</p>
                                                            <p className="text-[10px] text-slate-400">Min. Stok: {p.minStock} Pcs | SKU: {p.sku}</p>
                                                        </div>
                                                        <div className="text-right">
                                                            <span className="text-xs font-black text-amber-300 bg-amber-500/20 px-2 py-1 rounded-md border border-amber-500/30 inline-block">
                                                                Sisa {p.stock} Pcs
                                                            </span>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 border border-rose-500/30 p-4 rounded-2xl shadow-lg">
                                        <div className="flex justify-between items-center mb-3">
                                            <h3 className="text-sm font-bold text-rose-300 flex items-center gap-2">
                                                <span>⌛</span> Barang Mendekati Kadaluwarsa (Expired)
                                            </h3>
                                            <span className="text-xs bg-rose-500/20 text-rose-300 px-2 py-0.5 rounded-full font-bold border border-rose-500/30">
                                                {expiredSoonProducts.length} Barang
                                            </span>
                                        </div>

                                        <div className="space-y-2 max-h-52 overflow-y-auto pr-1">
                                            {expiredSoonProducts.length === 0 ? (
                                                <p className="text-xs text-slate-400 text-center py-6 font-semibold">Tidak ada barang yang mendekati expired 👍</p>
                                            ) : (
                                                expiredSoonProducts.map(p => {
                                                    const diffDays = Math.ceil((new Date(p.expiredDate) - new Date()) / (1000 * 60 * 60 * 24));
                                                    return (
                                                        <div key={p.id} className="p-2.5 bg-slate-950 border border-slate-800 rounded-xl flex justify-between items-center text-xs">
                                                            <div>
                                                                <p className="font-bold text-white">{p.name}</p>
                                                                <p className="text-[10px] text-slate-400">Tgl Exp: <span className="text-rose-300 font-bold">{p.expiredDate}</span></p>
                                                            </div>
                                                            <div className="text-right">
                                                                <span className="text-xs font-black text-rose-300 bg-rose-500/20 px-2 py-1 rounded-md border border-rose-500/30 inline-block">
                                                                    {diffDays <= 0 ? 'Sudah Expired' : `${diffDays} Hari Lagi`}
                                                                </span>
                                                            </div>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'pos' && (
                            <div className="flex flex-col lg:flex-row h-full overflow-hidden pb-16 md:pb-0">
                                <div className="flex-1 flex flex-col p-4 overflow-hidden">
                                    <div className="relative mb-4 flex gap-2">
                                        <div className="relative flex-1">
                                            <input type="text" placeholder="Ketik 1 huruf/angka, nama, barcode, atau SKU..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full bg-slate-900 border border-slate-700/80 rounded-2xl pl-11 pr-4 py-3 text-white text-sm" />
                                            <i data-lucide="search" className="absolute left-3.5 top-3.5 w-4 h-4 text-slate-300"></i>
                                        </div>

                                        <button onClick={() => setIsScannerOpen(!isScannerOpen)} className="px-3.5 py-3 bg-slate-900 border border-slate-700 text-indigo-300 rounded-2xl text-xs font-bold flex items-center gap-1.5">
                                            <i data-lucide="barcode" className="w-4 h-4"></i> Barcode
                                        </button>

                                        <button onClick={() => setIsVisualScanOpen(true)} className="px-3.5 py-3 bg-indigo-600/30 border border-indigo-500/60 text-indigo-200 rounded-2xl text-xs font-bold flex items-center gap-1.5">
                                            <i data-lucide="camera" className="w-4 h-4"></i> Visual Scan AI
                                        </button>
                                    </div>

                                    {isScannerOpen && (
                                        <div className="mb-4 bg-slate-900 p-3 rounded-2xl border border-indigo-500/50">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-xs font-bold text-indigo-300">Arahkan Kamera ke Barcode</span>
                                                <button onClick={() => setIsScannerOpen(false)} className="text-xs text-rose-300 font-bold">Tutup</button>
                                            </div>
                                            <div id="reader" className="overflow-hidden rounded-xl h-48 bg-slate-950"></div>
                                        </div>
                                    )}

                                    <div className="flex-1 overflow-y-auto pr-1">
                                        <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-3">
                                            {products.map(prod => (
                                                <div key={prod.id} onClick={() => addToCart(prod)} className="bg-slate-900 border border-slate-800 p-3 rounded-2xl cursor-pointer flex flex-col justify-between">
                                                    <div>
                                                        <div className="h-20 bg-slate-950 rounded-xl mb-2 flex items-center justify-center overflow-hidden border border-slate-800">
                                                            <ProductImage src={prod.imageUrl} alt={prod.name} className="w-full h-full" />
                                                        </div>
                                                        <p className="font-bold text-xs text-white line-clamp-2">{prod.name}</p>
                                                    </div>
                                                    <div className="mt-2 flex justify-between items-center">
                                                        <span className="text-[10px] text-slate-400">Stok: {prod.stock}</span>
                                                        <span className="font-black text-indigo-300 text-xs">Rp {prod.sellingPrice.toLocaleString('id-ID')}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="w-full lg:w-96 bg-slate-900 border-t lg:border-l border-slate-800 flex flex-col justify-between p-4">
                                    <div>
                                        <h3 className="font-bold text-white text-sm pb-3 border-b border-slate-800">Keranjang Kasir</h3>
                                        <div className="space-y-2 mt-3 max-h-56 lg:max-h-80 overflow-y-auto">
                                            {cart.map(({ product, qty }) => (
                                                <div key={product.id} className="p-2.5 bg-slate-950 border border-slate-800 rounded-xl flex justify-between items-center">
                                                    <div>
                                                        <p className="text-xs font-bold text-white truncate">{product.name}</p>
                                                        <p className="text-xs text-indigo-300 font-black">Rp {(product.sellingPrice * qty).toLocaleString('id-ID')}</p>
                                                    </div>
                                                    <div className="flex items-center gap-1.5">
                                                        <button onClick={() => updateCartQty(product.id, -1)} className="w-6 h-6 bg-slate-800 text-white rounded font-bold text-xs">-</button>
                                                        <span className="text-xs font-bold w-4 text-center">{qty}</span>
                                                        <button onClick={() => updateCartQty(product.id, 1)} className="w-6 h-6 bg-slate-800 text-white rounded font-bold text-xs">+</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="pt-3 border-t border-slate-800 space-y-3">
                                        <div className="flex justify-between text-base font-extrabold text-white">
                                            <span>Total Akhir</span>
                                            <span className="text-indigo-300 font-black">Rp {grandTotal.toLocaleString('id-ID')}</span>
                                        </div>
                                        <button disabled={cart.length === 0} onClick={() => setIsPaymentModalOpen(true)} className="w-full py-3 bg-indigo-600 disabled:bg-slate-800 font-black text-white rounded-xl text-sm">
                                            Bayar Sekarang
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'products' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-4 pb-24 md:pb-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black text-white">Daftar Produk & Stok</h2>
                                    <button onClick={() => handleOpenProductModal()} className="px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold flex items-center gap-2">
                                        <i data-lucide="plus" className="w-4 h-4"></i> Tambah Produk Baru
                                    </button>
                                </div>

                                <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-x-auto">
                                    <table className="w-full text-left text-xs text-slate-200">
                                        <thead className="bg-slate-950 text-slate-300 uppercase font-bold border-b border-slate-800">
                                            <tr>
                                                <th className="p-3">Foto</th>
                                                <th className="p-3">SKU</th>
                                                <th className="p-3">Nama Produk</th>
                                                <th className="p-3">Harga Modal</th>
                                                <th className="p-3">Harga Jual</th>
                                                <th className="p-3">Stok</th>
                                                <th className="p-3 text-center">Aksi</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800">
                                            {products.map(p => (
                                                <tr key={p.id} className="hover:bg-slate-800/50">
                                                    <td className="p-3"><div className="w-10 h-10 rounded-lg bg-slate-950 overflow-hidden"><ProductImage src={p.imageUrl} alt={p.name} className="w-full h-full" /></div></td>
                                                    <td className="p-3 font-mono">{p.sku}</td>
                                                    <td className="p-3 font-bold text-white">{p.name}</td>
                                                    <td className="p-3 text-amber-300">Rp {p.costPrice.toLocaleString('id-ID')}</td>
                                                    <td className="p-3 font-black text-indigo-300">Rp {p.sellingPrice.toLocaleString('id-ID')}</td>
                                                    <td className="p-3 font-bold">{p.stock} Pcs</td>
                                                    <td className="p-3 text-center">
                                                        <button onClick={() => handleOpenProductModal(p)} className="p-1.5 text-indigo-300"><i data-lucide="edit" className="w-3.5 h-3.5"></i></button>
                                                        <button onClick={() => handleDeleteProduct(p.id)} className="p-1.5 text-rose-300"><i data-lucide="trash-2" className="w-3.5 h-3.5"></i></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-4 pb-24 md:pb-6">
                                <h2 className="text-2xl font-black text-white">Pengaturan Toko & Cloud Sync</h2>
                                
                                <div className="bg-slate-900 border border-indigo-500/30 p-5 rounded-2xl space-y-3 max-w-lg shadow-lg">
                                    <h3 className="font-bold text-sm text-indigo-300 flex items-center gap-2">
                                        <i data-lucide="cloud" className="w-4 h-4"></i> Cloud Realtime Sync (fpos-8da84)
                                    </h3>
                                    <p className="text-xs text-slate-300">
                                        Gunakan tombol di bawah jika ingin memaksa pengiriman atau penarikan data antar perangkat.
                                    </p>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={handleBackupToFirebase}
                                            disabled={isBackingUp || isSyncing}
                                            className="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-xs shadow flex items-center justify-center gap-2"
                                        >
                                            <i data-lucide="upload-cloud" className="w-4 h-4"></i>
                                            {isBackingUp ? 'Memproses...' : 'Kirim Data ke Cloud'}
                                        </button>
                                        <button 
                                            onClick={handleRestoreFromFirebase}
                                            disabled={isBackingUp || isSyncing}
                                            className="flex-1 py-2.5 bg-slate-800 hover:bg-slate-700 text-indigo-300 rounded-xl font-bold text-xs border border-indigo-500/30 flex items-center justify-center gap-2"
                                        >
                                            <i data-lucide="download-cloud" className="w-4 h-4"></i>
                                            {isSyncing ? 'Mengunduh...' : 'Tarik Data dari Cloud'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL SCAN VISUAL AI */}
                    {isVisualScanOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-3xl p-5 space-y-4 text-center">
                                <h3 className="font-bold text-white text-sm">Visual Scan AI Kamera</h3>
                                <div className="border-2 border-indigo-500/50 rounded-2xl overflow-hidden bg-slate-950 h-56 relative">
                                    <video ref={visualVideoRef} autoPlay playsInline muted className="w-full h-full object-cover"></video>
                                </div>
                                {aiDetectedName && <p className="text-xs font-bold text-emerald-400 bg-emerald-500/10 p-2 rounded-xl">{aiDetectedName}</p>}
                                <button onClick={handleCaptureAndDetectAi} disabled={isAiLoading} className="w-full py-3 bg-indigo-600 text-white rounded-xl text-xs font-extrabold">
                                    {isAiLoading ? "Menganalisis..." : "Ambil Foto & Deteksi AI"}
                                </button>
                                <button onClick={() => setIsVisualScanOpen(false)} className="w-full py-2 bg-slate-800 text-slate-300 rounded-xl text-xs">Tutup</button>
                            </div>
                        </div>
                    )}

                    {/* MODAL PEMBAYARAN */}
                    {isPaymentModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-md rounded-3xl p-5 space-y-4">
                                <h3 className="font-bold text-white text-base">Pembayaran Kasir</h3>
                                <input type="number" placeholder={grandTotal.toString()} value={cashPaid} onChange={e => setCashPaid(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white font-black text-xl" />
                                <div className="flex gap-2">
                                    <button onClick={() => setIsPaymentModalOpen(false)} className="flex-1 py-2.5 bg-slate-800 text-slate-300 rounded-xl text-xs font-bold">Batal</button>
                                    <button onClick={handleCompletePayment} className="flex-1 py-2.5 bg-indigo-600 text-white rounded-xl text-xs font-bold">Selesaikan & Cetak</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL CETAK STRUK */}
                    {isReceiptModalOpen && lastCompletedTx && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-xs rounded-3xl p-5 space-y-4">
                                <div id="receipt-print-area" className="bg-white text-black p-3.5 rounded-xl receipt-font text-[11px] space-y-2 border">
                                    <p className="text-center font-extrabold uppercase">{storeInfo.storeName || 'VELO MART'}</p>
                                    <div className="space-y-1">
                                        {lastCompletedTx.items.map((item, i) => (
                                            <div key={i} className="flex justify-between text-[10px]">
                                                <span>{item.qty} x {item.name}</span>
                                                <span>Rp {item.subtotal.toLocaleString('id-ID')}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <p className="font-black text-xs text-right pt-2 border-t">TOTAL: Rp {lastCompletedTx.total.toLocaleString('id-ID')}</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => window.print()} className="flex-1 py-2.5 bg-indigo-600 text-white rounded-xl text-xs font-bold">Cetak Struk</button>
                                    <button onClick={() => setIsReceiptModalOpen(false)} className="py-2.5 px-4 bg-slate-800 text-slate-300 rounded-xl text-xs font-bold">Selesai</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
