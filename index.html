        const { useState, useEffect, useRef } = React;

        function processImageUrl(url) {
            if (!url || typeof url !== 'string') return '';
            let cleanUrl = url.trim();
            if (!cleanUrl) return '';
            if (cleanUrl.startsWith('data:image/')) return cleanUrl;
            if (cleanUrl.includes('drive.google.com') && cleanUrl.includes('/file/d/')) {
                const idMatch = cleanUrl.match(/\/file\/d\/([^\/]+)/);
                if (idMatch && idMatch[1]) cleanUrl = `https://drive.google.com/uc?export=view&id=${idMatch[1]}`;
            }
            if (cleanUrl.includes('dropbox.com')) cleanUrl = cleanUrl.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('?dl=0', '');
            if (cleanUrl.startsWith('http://')) cleanUrl = cleanUrl.replace('http://', 'https://');
            return cleanUrl;
        }

        function ProductImage({ src, alt, className }) {
            const [imgState, setImgState] = useState('loading');
            const [currentSrc, setCurrentSrc] = useState('');

            useEffect(() => {
                const processed = processImageUrl(src);
                if (!processed) { setImgState('empty'); return; }
                setCurrentSrc(processed);
                setImgState('loading');
            }, [src]);

            const handleError = () => {
                if (imgState === 'loading' && currentSrc && !currentSrc.startsWith('data:')) {
                    const rawUrl = currentSrc.replace(/^https?:\/\//, '');
                    setCurrentSrc(`https://images.weserv.nl/?url=${encodeURIComponent(rawUrl)}`);
                    setImgState('proxy');
                } else {
                    setImgState('error');
                }
            };

            if (imgState === 'empty' || imgState === 'error') {
                return (
                    <div className={`flex items-center justify-center bg-slate-900 text-slate-500 ${className}`}>
                        <i data-lucide="package" className="w-8 h-8 opacity-60"></i>
                    </div>
                );
            }

            return (
                <img src={currentSrc} alt={alt || "Foto Produk"} className={`${className} object-cover`} onLoad={() => setImgState('success')} onError={handleError} />
            );
        }

        function playBeepSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(1100, ctx.currentTime);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {
                console.log("Audio error:", e);
            }
        }

        const kamusSinonimAI = {

        };

        function formatDateLocal(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');

                await db.categories.bulkAdd([{ name: 'Makanan' }, { name: 'Minuman' }, { name: 'Sembako' }, { name: 'Kebutuhan' }]);
                await db.products.bulkAdd([
                    { id: '1', name: 'Indomie Goreng Spesial 85g', barcode: '089686010018', sku: 'IND-01', category: 'Makanan', costPrice: 2800, sellingPrice: 3500, stock: 4, minStock: 10, expiredDate: expSoon, totalSold: 142, lastSoldDate: '2026-07-22', imageUrl: '' },

                    { id: '4', name: 'Minyak Goreng Bimoli 1L', barcode: '899200110055', sku: 'BIM-01', category: 'Sembako', costPrice: 16000, sellingPrice: 19500, stock: 25, minStock: 5, expiredDate: expFar, totalSold: 45, lastSoldDate: '2026-07-15', imageUrl: '' },

        function App() {
            const [activeTab, setActiveTab] = useState('pos');
            const [products, setProducts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [storeInfo, setStoreInfo] = useState({});
            
            const [isBackingUp, setIsBackingUp] = useState(false);
            const [lastBackupTime, setLastBackupTime] = useState(localStorage.getItem('last_backup_time') || null);

            const [datePreset, setDatePreset] = useState('ALL');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');

            const [cart, setCart] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            
            const [isScannerOpen, setIsScannerOpen] = useState(false);
            const [isVisualScanOpen, setIsVisualScanOpen] = useState(false);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiStatusText, setAiStatusText] = useState('');
            
            const visualVideoRef = useRef(null);
            const visualStreamRef = useRef(null);
            const captureCanvasRef = useRef(null);
            const html5QrCodeRef = useRef(null);
            const aiModelRef = useRef(null);

            const [isPaymentModalOpen, setIsPaymentModalOpen] = useState(false);
            const [paymentMethod, setPaymentMethod] = useState('CASH');
            const [cashPaid, setCashPaid] = useState('');
            const [cashierInput, setCashierInput] = useState('');
            const [customerInput, setCustomerInput] = useState('');
            const [lastCompletedTx, setLastCompletedTx] = useState(null);
            const [isReceiptModalOpen, setIsReceiptModalOpen] = useState(false);

            const [isProductModalOpen, setIsProductModalOpen] = useState(false);
            const [imageInputMode, setImageInputMode] = useState('file');
            const [newCategoryInput, setNewCategoryInput] = useState('');
            const [isAddingNewCategory, setIsAddingNewCategory] = useState(false);
            const [productForm, setProductForm] = useState({
                id: '', name: '', sku: '', barcode: '', category: 'Makanan', costPrice: 0, sellingPrice: 0, stock: 0, minStock: 5, expiredDate: '', imageUrl: ''
            });

            const salesChartRef = useRef(null);
            const topProductsChartRef = useRef(null);
            const chartInstanceRef = useRef({});

            useEffect(() => {
                initSampleData().then(() => refreshData());
            }, []);

            const refreshData = async () => {
                const p = await db.products.toArray();
                const c = await db.categories.toArray();
                const t = await db.transactions.toArray();
                const s = await db.settings.get('store_info');
                setProducts(p);
                setCategories(c);
                setTransactions(t);
                if (s) setStoreInfo(s);
            };

            const handleBackupToFirebase = async () => {
                setIsBackingUp(true);
                try {
                    const backupData = {
                        products: await db.products.toArray(),
                        categories: await db.categories.toArray(),
                        transactions: await db.transactions.toArray(),
                        settings: await db.settings.get('store_info') || {},
                        updatedAt: new Date().toISOString()
                    };
                    await firebaseDb.ref('pos_backup').set(backupData);
                    const nowStr = new Date().toLocaleString('id-ID');
                    setLastBackupTime(nowStr);
                    localStorage.setItem('last_backup_time', nowStr);
                    alert("✅ Berhasil backup ke Firebase Cloud!");
                } catch (error) {
                    alert("❌ Gagal backup: " + error.message);
                } finally {
                    setIsBackingUp(false);
                }
            };

            // Barcode Scanner Setup
            useEffect(() => {
                if (isScannerOpen) {
                    setTimeout(() => {
                        const readerElem = document.getElementById("reader");
                        if (!readerElem) return;
                        const html5QrCode = new Html5Qrcode("reader");
                        html5QrCodeRef.current = html5QrCode;

                        html5QrCode.start(
                            { facingMode: "environment" },
                            { fps: 20, qrbox: { width: 220, height: 130 } },
                            (decodedText) => {
                                playBeepSound();
                                const found = products.find(p => p.barcode === decodedText || p.sku === decodedText);
                                if (found) {
                                    addToCart(found);
                                    setIsScannerOpen(false);
                                } else {
                                    alert(`Barcode "${decodedText}" tidak ditemukan di database produk!`);
                                    setIsScannerOpen(false);
                                }
                            },
                            () => {}
                        ).catch(err => {
                            alert("Kamera barcode gagal diakses: " + err);
                            setIsScannerOpen(false);
                        });
                    }, 300);
                } else {
                    if (html5QrCodeRef.current && html5QrCodeRef.current.isScanning) {
                        html5QrCodeRef.current.stop().then(() => html5QrCodeRef.current.clear()).catch(e => {});
                    }
                }
            }, [isScannerOpen, products]);

            // AI Visual Scanner Setup (TensorFlow.js MobileNet)
            useEffect(() => {
                if (isVisualScanOpen) {
                    setAiStatusText("Mengaktifkan lensa kamera AI...");
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
                        .then(stream => {
                            visualStreamRef.current = stream;
                            if (visualVideoRef.current) {
                                visualVideoRef.current.srcObject = stream;
                            }
                            setAiStatusText("Kamera aktif. Silakan arahkan ke produk lalu klik 'Deteksi Foto AI'.");
                        })
                        .catch(err => {
                            alert("Akses kamera visual ditolak: " + err.message);
                            setIsVisualScanOpen(false);
                        });
                } else {
                    if (visualStreamRef.current) {
                        visualStreamRef.current.getTracks().forEach(track => track.stop());
                        visualStreamRef.current = null;
                    }
                }
            }, [isVisualScanOpen]);

            const handleCaptureAndDetectAi = async () => {
                if (!visualVideoRef.current) return;
                setIsAiLoading(true);
                setAiStatusText("Mengekstrak bentuk visual objek...");

                try {
                    if (!aiModelRef.current) {
                        aiModelRef.current = await mobilenet.load();
                    }

                    const video = visualVideoRef.current;
                    const canvas = captureCanvasRef.current;
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    const predictions = await aiModelRef.current.classify(canvas);
                    if (predictions && predictions.length > 0) {
                        const topPred = predictions[0].className.toLowerCase();
                        setAiStatusText(`Objek: ${predictions[0].className} (${(predictions[0].probability * 100).toFixed(1)}%)`);
                        playBeepSound();

                        let sinonimList = [];
                        Object.keys(kamusSinonimAI).forEach(key => {
                            if (topPred.includes(key) || key.includes(topPred)) {
                                sinonimList = sinonimList.concat(kamusSinonimAI[key]);
                            }
                        });

                        let matched = products.find(p => {
                            const nameL = p.name.toLowerCase();
                            const catL = (p.category || '').toLowerCase();
                            if (nameL.includes(topPred) || topPred.includes(nameL) || catL.includes(topPred)) return true;
                            return sinonimList.some(s => nameL.includes(s) || catL.includes(s));
                        });

                        if (!matched && products.length > 0) {
                            matched = products[0];
                        }

                        if (matched) {
                            setTimeout(() => {
                                addToCart(matched);
                                setIsVisualScanOpen(false);
                                setIsAiLoading(false);
                                alert(`✨ Visual AI Berhasil! Mengenali objek "${predictions[0].className}" dan memasukkan "${matched.name}" ke keranjang.`);
                            }, 500);
                        } else {
                            setIsAiLoading(false);
                            alert(`Objek terdeteksi "${topPred}", namun tidak ada produk yang cocok di sistem.`);
                        }
                    } else {
                        setIsAiLoading(false);
                        setAiStatusText("Objek tidak dikenali, coba posisikan ulang.");
                    }
                } catch (err) {
                    setIsAiLoading(false);
                    setAiStatusText("Gagal memproses AI model.");
                    alert("Error AI: " + err.message);
                }
            };

            useEffect(() => {
                if (!searchQuery.trim()) { setSearchResults([]); return; }
                const q = searchQuery.toLowerCase();
                setSearchResults(products.filter(p => p.name.toLowerCase().includes(q) || p.barcode.includes(q) || p.sku.toLowerCase().includes(q)));
            }, [searchQuery, products]);

            const lowStockProducts = products.filter(p => p.stock <= p.minStock);
            const expiredSoonProducts = products.filter(p => {
                if (!p.expiredDate) return false;
                const diff = Math.ceil((new Date(p.expiredDate) - new Date()) / (1000 * 60 * 60 * 24));
                return diff <= 30;
            });

            const handleApplyPreset = (presetKey) => {
                setDatePreset(presetKey);
                const now = new Date();
                if (presetKey === 'TODAY') {
                    const s = formatDateLocal(now);
                    setStartDate(s); setEndDate(s);
                } else if (presetKey === 'YESTERDAY') {
                    const y = new Date(now); y.setDate(now.getDate() - 1);
                    const s = formatDateLocal(y);
                    setStartDate(s); setEndDate(s);
                } else if (presetKey === 'LAST_7') {
                    const d = new Date(now); d.setDate(now.getDate() - 6);
                    setStartDate(formatDateLocal(d)); setEndDate(formatDateLocal(now));
                } else if (presetKey === 'LAST_30') {
                    const d = new Date(now); d.setDate(now.getDate() - 29);
                    setStartDate(formatDateLocal(d)); setEndDate(formatDateLocal(now));
                } else if (presetKey === 'ALL') {
                    setStartDate(''); setEndDate('');
                }
            };

            const filteredTransactions = transactions.filter(t => {
                const txDate = new Date(t.createdAt).toISOString().split('T')[0];
                if (startDate && txDate < startDate) return false;
                if (endDate && txDate > endDate) return false;
                return true;
            });

            const totalOmsetFilter = filteredTransactions.reduce((acc, t) => acc + t.total, 0);
            const totalHppFilter = filteredTransactions.reduce((acc, t) => acc + (t.totalCost || 0), 0);
            const totalProfitFilter = filteredTransactions.reduce((acc, t) => acc + (t.profit || 0), 0);

            const exportToExcel = () => {
                if (filteredTransactions.length === 0) { alert("Tidak ada data transaksi!"); return; }
                const excelData = filteredTransactions.map((t, idx) => ({
                    "No": idx + 1, "No TRX": t.transactionNo, "Waktu": new Date(t.createdAt).toLocaleString('id-ID'),
                    "Kasir": t.cashierName || '-', "Pelanggan": t.customerName || '-', "Metode": t.paymentMethod,
                    "Omset (Rp)": t.total, "HPP (Rp)": t.totalCost || 0, "Profit (Rp)": t.profit || 0
                }));
                const ws = XLSX.utils.json_to_sheet(excelData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Laporan");
                XLSX.writeFile(wb, `Laporan_VeloPOS_${startDate || 'Semua'}.xlsx`);
            };

            const addToCart = (product) => {
                setCart(prev => {
                    const exist = prev.find(i => i.product.id === product.id);
                    if (exist) return prev.map(i => i.product.id === product.id ? { ...i, qty: i.qty + 1 } : i);
                    return [...prev, { product, qty: 1 }];
                });
                setSearchQuery(''); setSearchResults([]);
            };

            const updateCartQty = (id, delta) => {
                setCart(prev => prev.map(i => {
                    if (i.product.id === id) {
                        const n = i.qty + delta;
                        return n > 0 ? { ...i, qty: n } : null;
                    }
                    return i;
                }).filter(Boolean));
            };

            const grandTotal = cart.reduce((a, b) => a + (b.product.sellingPrice * b.qty), 0);
            const totalCartCost = cart.reduce((a, b) => a + ((b.product.costPrice || 0) * b.qty), 0);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setProductForm(prev => ({ ...prev, imageUrl: reader.result }));
                    reader.readAsDataURL(file);
                }
            };

            const handleAddCategory = async () => {
                if (!newCategoryInput.trim()) return;
                await db.categories.add({ name: newCategoryInput.trim() });
                await refreshData();
                setProductForm(prev => ({ ...prev, category: newCategoryInput.trim() }));
                setNewCategoryInput(''); setIsAddingNewCategory(false);
            };

            const handleCompletePayment = async () => {
                const paid = parseFloat(cashPaid) || grandTotal;
                if (paymentMethod === 'CASH' && paid < grandTotal) { alert("Uang bayar kurang!"); return; }

                const newTx = {
                    transactionNo: 'TRX-' + Date.now().toString().slice(-8),
                    items: cart.map(c => ({ id: c.product.id, name: c.product.name, costPrice: c.product.costPrice || 0, price: c.product.sellingPrice, qty: c.qty, subtotal: c.product.sellingPrice * c.qty })),
                    total: grandTotal, totalCost: totalCartCost, profit: grandTotal - totalCartCost,
                    paid, change: paid - grandTotal, paymentMethod, cashierName: cashierInput.trim(), customerName: customerInput.trim(), createdAt: new Date().toISOString()
                };

                await db.transactions.add(newTx);
                for (const item of cart) {
                    const prod = await db.products.get(item.product.id);
                    if (prod) {
                        await db.products.update(item.product.id, { 
                            stock: Math.max(0, prod.stock - item.qty),
                            totalSold: (prod.totalSold || 0) + item.qty,
                            lastSoldDate: new Date().toISOString().split('T')[0]
                        });
                    }
                }

                setLastCompletedTx(newTx); setCart([]); setIsPaymentModalOpen(false); setIsReceiptModalOpen(true); setCashPaid('');
                refreshData();
            };

            const handleOpenProductModal = (product = null) => {
                if (product) {
                    setProductForm(product);
                    setImageInputMode(product.imageUrl && product.imageUrl.startsWith('http') ? 'url' : 'file');
                } else {
                    setProductForm({
                        id: 'PROD-' + Date.now().toString().slice(-6), name: '', sku: 'SKU-' + Math.floor(100 + Math.random() * 900),
                        barcode: Math.floor(100000000000 + Math.random() * 900000000000).toString(), category: categories[0]?.name || 'Makanan',
                        costPrice: 0, sellingPrice: 0, stock: 10, minStock: 5, expiredDate: '', imageUrl: ''
                    });
                    setImageInputMode('file');
                }
                setIsProductModalOpen(true);
            };

            const handleSaveProduct = async (e) => {
                e.preventDefault();
                await db.products.put({
                    ...productForm,
                    costPrice: parseFloat(productForm.costPrice) || 0,
                    sellingPrice: parseFloat(productForm.sellingPrice) || 0,
                    stock: parseInt(productForm.stock) || 0,
                    minStock: parseInt(productForm.minStock) || 0
                });
                setIsProductModalOpen(false); refreshData();
            };

            const handleDeleteProduct = async (id) => {
                if (confirm("Hapus produk ini?")) { await db.products.delete(id); refreshData(); }
            };

            useEffect(() => {
                if (activeTab === 'dashboard' && salesChartRef.current && topProductsChartRef.current) {
                    if (chartInstanceRef.current.sales) chartInstanceRef.current.sales.destroy();
                    if (chartInstanceRef.current.top) chartInstanceRef.current.top.destroy();

                    chartInstanceRef.current.sales = new Chart(salesChartRef.current.getContext('2d'), {
                        type: 'line',
                        data: {
                            labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
                            datasets: [{ label: 'Omset', data: [1200, 1900, 1500, 2200, 2800, 3500, 3100], borderColor: '#818cf8', backgroundColor: 'rgba(99,102,241,0.15)', fill: true, tension: 0.4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });

                    const sortedTop = [...products].sort((a, b) => b.totalSold - a.totalSold).slice(0, 5);
                    chartInstanceRef.current.top = new Chart(topProductsChartRef.current.getContext('2d'), {
                        type: 'bar',
                        data: {
                            labels: sortedTop.map(p => p.name.slice(0, 10)),
                            datasets: [{ label: 'Terjual', data: sortedTop.map(p => p.totalSold), backgroundColor: '#10b981' }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }
            }, [activeTab, products]);

            useEffect(() => { setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100); });

            return (
                <div className="flex flex-col md:flex-row h-screen w-screen overflow-hidden bg-slate-950 text-white">
                    
                    {/* SIDEBAR */}
                    <aside className="hidden md:flex flex-col w-64 bg-slate-900 border-r border-slate-800 p-4 justify-between">
                        <div>
                            <div className="flex items-center gap-3 px-2 py-3 mb-6">
                                <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center font-black text-xl shadow-lg shadow-indigo-500/30 text-white">V</div>
                                <div>
                                    <h1 className="font-bold text-white text-base leading-none">VeloPOS Pro</h1>
                                    <span className="text-[10px] text-emerald-400 font-semibold">● AI & Barcode Ready</span>
                                </div>
                            </div>

                            <nav className="space-y-1.5">
                                <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    🏠 Dashboard
                                </button>
                                <button onClick={() => setActiveTab('pos')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'pos' ? 'bg-indigo-600 text-white' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    🛒 POS Kasir
                                </button>
                                <button onClick={() => setActiveTab('products')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'products' ? 'bg-indigo-600 text-white' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    📦 Produk & Stok
                                </button>
                                <button onClick={() => setActiveTab('reports')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'reports' ? 'bg-indigo-600 text-white' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    📊 Laporan & Excel
                                </button>
                                <button onClick={() => setActiveTab('settings')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition ${activeTab === 'settings' ? 'bg-indigo-600 text-white' : 'text-slate-300 hover:bg-slate-800'}`}>
                                    ⚙ Pengaturan
                                </button>
                            </nav>
                        </div>

                        <div className="space-y-3">
                            <button onClick={handleBackupToFirebase} disabled={isBackingUp} className="w-full py-2.5 px-3 bg-indigo-600/20 hover:bg-indigo-600 border border-indigo-500/50 text-indigo-300 hover:text-white rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition">
                                ☁️ {isBackingUp ? 'Backup...' : 'Backup Firebase'}
                            </button>
                            {lastBackupTime && <p className="text-[10px] text-slate-400 text-center">Terakhir: {lastBackupTime}</p>}
                        </div>
                    </aside>

                    {/* MAIN */}
                    <main className="flex-1 flex flex-col h-full overflow-hidden relative">
                        
                        {activeTab === 'dashboard' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-6 pb-24 md:pb-6">
                                <h2 className="text-2xl font-black text-white">Dashboard Utama</h2>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                                        <p className="text-xs text-slate-400 font-bold uppercase">Total Omset</p>
                                        <p className="text-lg font-black text-indigo-300 mt-1">Rp {transactions.reduce((a, t) => a + t.total, 0).toLocaleString('id-ID')}</p>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                                        <p className="text-xs text-slate-400 font-bold uppercase">Modal HPP</p>
                                        <p className="text-lg font-black text-amber-300 mt-1">Rp {transactions.reduce((a, t) => a + (t.totalCost || 0), 0).toLocaleString('id-ID')}</p>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                                        <p className="text-xs text-slate-400 font-bold uppercase">Profit Bersih</p>
                                        <p className="text-lg font-black text-emerald-300 mt-1">Rp {transactions.reduce((a, t) => a + (t.profit || 0), 0).toLocaleString('id-ID')}</p>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl">
                                        <p className="text-xs text-slate-400 font-bold uppercase">Transaksi</p>
                                        <p className="text-lg font-black text-sky-300 mt-1">{transactions.length} TRX</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl h-72">
                                        <h3 className="text-sm font-bold text-white mb-3">Grafik Penjualan</h3>
                                        <div className="h-56"><canvas ref={salesChartRef}></canvas></div>
                                    </div>
                                    <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl h-72">
                                        <h3 className="text-sm font-bold text-white mb-3">Produk Terlaris</h3>
                                        <div className="h-56"><canvas ref={topProductsChartRef}></canvas></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'pos' && (
                            <div className="flex flex-col lg:flex-row h-full overflow-hidden pb-16 md:pb-0">
                                <div className="flex-1 flex flex-col p-4 overflow-hidden">
                                    <div className="relative mb-4 flex gap-2">
                                        <div className="relative flex-1">
                                            <input 
                                                type="text"
                                                placeholder="Ketik nama, barcode, atau SKU produk..."
                                                value={searchQuery}
                                                onChange={e => setSearchQuery(e.target.value)}
                                                className="w-full bg-slate-900 border border-slate-700 rounded-2xl pl-11 pr-4 py-3 text-white font-semibold placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
                                            />
                                            <i data-lucide="search" className="absolute left-3.5 top-3.5 w-4 h-4 text-slate-400"></i>
                                        </div>

                                        <button onClick={() => setIsScannerOpen(!isScannerOpen)} className={`px-3 py-3 border text-xs font-bold rounded-2xl flex items-center gap-1.5 ${isScannerOpen ? 'bg-indigo-600 border-indigo-400 text-white' : 'bg-slate-900 border-slate-700 text-indigo-300'}`}>
                                            📷 Barcode
                                        </button>

                                        <button onClick={() => setIsVisualScanOpen(true)} className="px-3.5 py-3 bg-indigo-600/30 border border-indigo-500/60 text-indigo-200 rounded-2xl flex items-center gap-1.5 text-xs font-bold hover:bg-indigo-600 hover:text-white transition">
                                            ✨ Visual Scan AI
                                        </button>
                                    </div>

                                    {isScannerOpen && (
                                        <div className="mb-4 bg-slate-900 p-3 rounded-2xl border border-indigo-500/50 shadow-2xl">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-xs font-bold text-indigo-300">Arahkan Kamera ke Barcode</span>
                                                <button onClick={() => setIsScannerOpen(false)} className="text-xs bg-rose-500/20 text-rose-300 px-2 py-1 rounded">Tutup</button>
                                            </div>
                                            <div id="reader" className="overflow-hidden rounded-xl h-48 bg-slate-950 border border-slate-800"></div>
                                        </div>
                                    )}

                                    {searchResults.length > 0 && (
                                        <div className="mb-4 bg-slate-900 border border-slate-700 rounded-2xl max-h-60 overflow-y-auto shadow-2xl z-40">
                                            {searchResults.map(prod => (
                                                <div key={prod.id} onClick={() => addToCart(prod)} className="p-3 hover:bg-indigo-600/30 border-b border-slate-800 cursor-pointer flex justify-between items-center">
                                                    <div>
                                                        <p className="font-bold text-sm text-white">{prod.name}</p>
                                                        <p className="text-xs text-slate-400">SKU: {prod.sku} | Stok: {prod.stock}</p>
                                                    </div>
                                                    <span className="text-indigo-300 font-black text-sm">Rp {prod.sellingPrice.toLocaleString('id-ID')}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    <div className="flex-1 overflow-y-auto pr-1">
                                        <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-3">
                                            {products.map(prod => (
                                                <div key={prod.id} onClick={() => addToCart(prod)} className="bg-slate-900 hover:bg-slate-800 border border-slate-800 p-3 rounded-2xl cursor-pointer flex flex-col justify-between transition shadow">
                                                    <div>
                                                        <div className="h-20 bg-slate-950 rounded-xl mb-2 flex items-center justify-center text-slate-500 overflow-hidden border border-slate-800">
                                                            <ProductImage src={prod.imageUrl} alt={prod.name} className="w-full h-full" />
                                                        </div>
                                                        <p className="font-bold text-xs text-white line-clamp-2">{prod.name}</p>
                                                    </div>
                                                    <div className="mt-2 flex justify-between items-center">
                                                        <span className="text-[10px] text-slate-400">Stok: {prod.stock}</span>
                                                        <span className="font-black text-indigo-300 text-xs">Rp {prod.sellingPrice.toLocaleString('id-ID')}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="w-full lg:w-96 bg-slate-900 border-t lg:border-t-0 lg:border-l border-slate-800 flex flex-col justify-between p-4 shadow-2xl">
                                    <div>
                                        <div className="flex justify-between items-center pb-3 border-b border-slate-800">
                                            <h3 className="font-bold text-white text-sm">🛒 Keranjang Kasir</h3>
                                            <span className="text-xs bg-indigo-500/20 text-indigo-300 px-2.5 py-0.5 rounded-full font-bold">{cart.reduce((a, b) => a + b.qty, 0)} Items</span>
                                        </div>

                                        <div className="space-y-2 mt-3 max-h-64 lg:max-h-80 overflow-y-auto pr-1">
                                            {cart.length === 0 ? (
                                                <p className="text-center py-8 text-xs text-slate-400">Keranjang kosong</p>
                                            ) : (
                                                cart.map(({ product, qty }) => (
                                                    <div key={product.id} className="p-2.5 bg-slate-950 border border-slate-800 rounded-xl flex justify-between items-center gap-2">
                                                        <div className="flex-1 min-w-0">
                                                            <p className="text-xs font-bold text-white truncate">{product.name}</p>
                                                            <p className="text-xs text-indigo-300 font-black">Rp {(product.sellingPrice * qty).toLocaleString('id-ID')}</p>
                                                        </div>
                                                        <div className="flex items-center gap-1.5">
                                                            <button onClick={() => updateCartQty(product.id, -1)} className="w-6 h-6 bg-slate-800 text-white rounded font-bold text-xs">-</button>
                                                            <span className="text-xs font-extrabold w-4 text-center">{qty}</span>
                                                            <button onClick={() => updateCartQty(product.id, 1)} className="w-6 h-6 bg-slate-800 text-white rounded font-bold text-xs">+</button>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>

                                    <div className="pt-3 border-t border-slate-800 space-y-3">
                                        <div className="flex justify-between items-center text-base font-extrabold text-white">
                                            <span>Total Akhir</span>
                                            <span className="text-indigo-300 font-black text-lg">Rp {grandTotal.toLocaleString('id-ID')}</span>
                                        </div>
                                        <button disabled={cart.length === 0} onClick={() => setIsPaymentModalOpen(true)} className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 font-black text-white rounded-xl shadow-lg shadow-indigo-600/30 text-sm transition">
                                            Bayar Sekarang
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'products' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-4 pb-24 md:pb-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black text-white">Daftar Produk & Stok</h2>
                                    <button onClick={() => handleOpenProductModal()} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-bold shadow transition">
                                        + Tambah Produk
                                    </button>
                                </div>

                                <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-lg">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-xs text-slate-200">
                                            <thead className="bg-slate-950 uppercase font-bold border-b border-slate-800">
                                                <tr>
                                                    <th className="p-3">Foto</th>
                                                    <th className="p-3">SKU / Barcode</th>
                                                    <th className="p-3">Nama Produk</th>
                                                    <th className="p-3">HPP (Modal)</th>
                                                    <th className="p-3">Harga Jual</th>
                                                    <th className="p-3">Stok</th>
                                                    <th className="p-3 text-center">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-800 font-medium">
                                                {products.map(p => (
                                                    <tr key={p.id} className="hover:bg-slate-800/50">
                                                        <td className="p-3">
                                                            <div className="w-10 h-10 rounded-lg bg-slate-950 border border-slate-800 overflow-hidden flex items-center justify-center">
                                                                <ProductImage src={p.imageUrl} alt={p.name} className="w-full h-full" />
                                                            </div>
                                                        </td>
                                                        <td className="p-3 font-mono text-slate-300">{p.sku}<br/><span className="text-[10px] text-slate-400">{p.barcode}</span></td>
                                                        <td className="p-3 font-bold text-white">{p.name}</td>
                                                        <td className="p-3 text-amber-300 font-extrabold">Rp {p.costPrice?.toLocaleString('id-ID')}</td>
                                                        <td className="p-3 text-indigo-300 font-black">Rp {p.sellingPrice?.toLocaleString('id-ID')}</td>
                                                        <td className="p-3 font-extrabold"><span className="px-2 py-1 rounded bg-emerald-500/20 text-emerald-300">{p.stock} Pcs</span></td>
                                                        <td className="p-3 text-center">
                                                            <button onClick={() => handleOpenProductModal(p)} className="p-1.5 bg-slate-800 text-indigo-300 rounded mr-1">✏️</button>
                                                            <button onClick={() => handleDeleteProduct(p.id)} className="p-1.5 bg-slate-800 text-rose-300 rounded">🗑️</button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'reports' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-4 pb-24 md:pb-6">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                                    <h2 className="text-2xl font-black text-white">Laporan & Ekspor Excel</h2>
                                    <button onClick={exportToExcel} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl text-xs font-bold shadow">
                                        📊 Ekspor ke Excel (.xlsx)
                                    </button>
                                </div>

                                <div className="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3">
                                    <div className="flex flex-wrap items-center gap-2">
                                        {['ALL', 'TODAY', 'YESTERDAY', 'LAST_7', 'LAST_30'].map(k => (
                                            <button key={k} onClick={() => handleApplyPreset(k)} className={`px-3 py-1.5 rounded-xl text-xs font-bold border ${datePreset === k ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-slate-950 border-slate-800 text-slate-300'}`}>
                                                {k === 'ALL' ? 'Semua' : k === 'TODAY' ? 'Hari Ini' : k === 'YESTERDAY' ? 'Kemarin' : k === 'LAST_7' ? '7 Hari' : '30 Hari'}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                    <div className="p-3.5 bg-indigo-500/15 border border-indigo-500/30 rounded-xl text-xs font-bold flex justify-between">
                                        <span>Total Omset:</span> <span className="text-indigo-300">Rp {totalOmsetFilter.toLocaleString('id-ID')}</span>
                                    </div>
                                    <div className="p-3.5 bg-amber-500/15 border border-amber-500/30 rounded-xl text-xs font-bold flex justify-between">
                                        <span>Total Modal (HPP):</span> <span className="text-amber-300">Rp {totalHppFilter.toLocaleString('id-ID')}</span>
                                    </div>
                                    <div className="p-3.5 bg-emerald-500/15 border border-emerald-500/30 rounded-xl text-xs font-bold flex justify-between">
                                        <span>Profit Bersih:</span> <span className="text-emerald-300">Rp {totalProfitFilter.toLocaleString('id-ID')}</span>
                                    </div>
                                </div>

                                <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-lg">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-xs text-slate-200">
                                            <thead className="bg-slate-950 uppercase font-bold border-b border-slate-800">
                                                <tr>
                                                    <th className="p-3">No TRX</th>
                                                    <th className="p-3">Waktu</th>
                                                    <th className="p-3">Kasir / Pelanggan</th>
                                                    <th className="p-3 text-right">Omset</th>
                                                    <th className="p-3 text-right">Profit</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-800">
                                                {filteredTransactions.length === 0 ? (
                                                    <tr><td colSpan="5" className="p-6 text-center text-slate-400">Tidak ada transaksi.</td></tr>
                                                ) : (
                                                    filteredTransactions.slice().reverse().map(t => (
                                                        <tr key={t.id} className="hover:bg-slate-800/50">
                                                            <td className="p-3 font-mono text-indigo-300 font-bold">{t.transactionNo}</td>
                                                            <td className="p-3">{new Date(t.createdAt).toLocaleString('id-ID')}</td>
                                                            <td className="p-3">{t.cashierName || 'Kasir'} / {t.customerName || 'Umum'}</td>
                                                            <td className="p-3 text-right font-black text-indigo-300">Rp {t.total.toLocaleString('id-ID')}</td>
                                                            <td className="p-3 text-right font-black text-emerald-300">Rp {(t.profit || 0).toLocaleString('id-ID')}</td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="p-4 md:p-6 overflow-y-auto space-y-4 pb-24 md:pb-6">
                                <h2 className="text-2xl font-black text-white">Pengaturan Toko</h2>
                                <div className="bg-slate-900 border border-slate-800 p-5 rounded-2xl space-y-4 max-w-lg shadow-lg">
                                    <div>
                                        <label className="text-xs font-bold text-slate-300">Nama Toko</label>
                                        <input type="text" value={storeInfo.storeName || ''} onChange={e => setStoreInfo({...storeInfo, storeName: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs text-white mt-1"/>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-300">Alamat Toko</label>
                                        <input type="text" value={storeInfo.address || ''} onChange={e => setStoreInfo({...storeInfo, address: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-xs text-white mt-1"/>
                                    </div>
                                    <button onClick={async () => { await db.settings.put({...storeInfo, id: 'store_info'}); alert("Disimpan!"); }} className="px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold">Simpan</button>
                                </div>
                            </div>
                        )}

                        {/* MOBILE NAVBAR */}
                        <div className="md:hidden fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around p-2 z-50">
                            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center text-[10px] ${activeTab === 'dashboard' ? 'text-indigo-400 font-bold' : 'text-slate-400'}`}>🏠 Home</button>
                            <button onClick={() => setActiveTab('products')} className={`flex flex-col items-center text-[10px] ${activeTab === 'products' ? 'text-indigo-400 font-bold' : 'text-slate-400'}`}>📦 Produk</button>
                            <button onClick={() => setActiveTab('pos')} className={`flex flex-col items-center text-[10px] ${activeTab === 'pos' ? 'text-indigo-400 font-bold' : 'text-slate-400'}`}>🛒 POS</button>
                            <button onClick={() => setActiveTab('reports')} className={`flex flex-col items-center text-[10px] ${activeTab === 'reports' ? 'text-indigo-400 font-bold' : 'text-slate-400'}`}>📊 Laporan</button>
                            <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center text-[10px] ${activeTab === 'settings' ? 'text-indigo-400 font-bold' : 'text-slate-400'}`}>⚙ Setting</button>
                        </div>
                    </main>

                    {/* MODAL AI VISUAL SCAN (DARI FILE 1) */}
                    {isVisualScanOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-3xl p-5 space-y-4 text-center shadow-2xl">
                                <h3 className="font-bold text-white text-sm flex items-center justify-center gap-2">
                                    ✨ AI Visual Product Scanner
                                </h3>
                                <div className="border-2 border-indigo-500/50 rounded-2xl overflow-hidden bg-slate-950 h-56 relative flex items-center justify-center">
                                    <video ref={visualVideoRef} autoPlay playsinline muted className="w-full h-full object-cover"></video>
                                    <canvas ref={captureCanvasRef} className="hidden"></canvas>
                                    {isAiLoading && (
                                        <div className="absolute inset-0 bg-slate-950/80 flex flex-col items-center justify-center p-3">
                                            <div className="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-2"></div>
                                            <p className="text-xs font-bold text-indigo-300">Mendeteksi Objek...</p>
                                        </div>
                                    )}
                                </div>
                                <p className="text-xs font-bold text-emerald-400 bg-emerald-500/10 p-2 rounded-xl border border-emerald-500/20 truncate">
                                    {aiStatusText || "Arahkan kamera ke produk"}
                                </p>
                                <div className="space-y-2">
                                    <button onClick={handleCaptureAndDetectAi} disabled={isAiLoading} className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-extrabold shadow-lg">
                                        📷 Ambil Foto & Deteksi AI
                                    </button>
                                    <button onClick={() => setIsVisualScanOpen(false)} className="w-full py-2 bg-slate-800 text-slate-300 rounded-xl text-xs font-bold">Tutup</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL PRODUK */}
                    {isProductModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-lg rounded-3xl p-5 space-y-4 max-h-[90vh] overflow-y-auto">
                                <h3 className="font-bold text-white text-sm">{productForm.id ? 'Edit Produk' : 'Tambah Produk'}</h3>
                                <form onSubmit={handleSaveProduct} className="space-y-3 text-xs">
                                    <div>
                                        <label className="text-slate-300 font-bold">Nama Produk</label>
                                        <input type="text" required value={productForm.name} onChange={e => setProductForm({...productForm, name: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1"/>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-slate-300 font-bold">HPP Modal (Rp)</label>
                                            <input type="number" required value={productForm.costPrice} onChange={e => setProductForm({...productForm, costPrice: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1"/>
                                        </div>
                                        <div>
                                            <label className="text-slate-300 font-bold">Harga Jual (Rp)</label>
                                            <input type="number" required value={productForm.sellingPrice} onChange={e => setProductForm({...productForm, sellingPrice: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1"/>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-slate-300 font-bold">Stok</label>
                                            <input type="number" value={productForm.stock} onChange={e => setProductForm({...productForm, stock: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1"/>
                                        </div>
                                        <div>
                                            <label className="text-slate-300 font-bold">Barcode</label>
                                            <input type="text" value={productForm.barcode} onChange={e => setProductForm({...productForm, barcode: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white mt-1"/>
                                        </div>
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button type="button" onClick={() => setIsProductModalOpen(false)} className="flex-1 py-2 bg-slate-800 rounded-xl">Batal</button>
                                        <button type="submit" className="flex-1 py-2 bg-indigo-600 rounded-xl font-bold">Simpan</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL PEMBAYARAN */}
                    {isPaymentModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-md rounded-3xl p-5 space-y-4">
                                <h3 className="font-bold text-white text-base">Pembayaran Kasir</h3>
                                <div>
                                    <label className="text-xs text-slate-300 font-bold">Uang Diterima (Rp)</label>
                                    <input type="number" placeholder={grandTotal.toString()} value={cashPaid} onChange={e => setCashPaid(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white font-black text-xl mt-1"/>
                                </div>
                                <div className="p-3 bg-slate-950 rounded-xl text-xs space-y-1">
                                    <div className="flex justify-between"><span>Total:</span> <span className="font-black text-indigo-300">Rp {grandTotal.toLocaleString('id-ID')}</span></div>
                                    <div className="flex justify-between"><span>Kembalian:</span> <span className="font-black text-emerald-300">Rp {Math.max(0, (parseFloat(cashPaid) || grandTotal) - grandTotal).toLocaleString('id-ID')}</span></div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setIsPaymentModalOpen(false)} className="flex-1 py-2 bg-slate-800 rounded-xl">Batal</button>
                                    <button onClick={handleCompletePayment} className="flex-1 py-2 bg-indigo-600 rounded-xl font-bold">Bayar & Cetak</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL STRUK */}
                    {isReceiptModalOpen && lastCompletedTx && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-xs rounded-3xl p-5 space-y-4">
                                <div id="receipt-print-area" className="bg-white text-black p-3.5 rounded-xl receipt-font text-[11px] space-y-2 font-bold">
                                    <div className="text-center font-extrabold">
                                        <p className="text-xs uppercase">{storeInfo.storeName || 'VELO MART'}</p>
                                        <p className="text-[9.5px]">{storeInfo.address}</p>
                                        <p>------------------------------</p>
                                    </div>
                                    <div className="space-y-0.5 text-[9.5px]">
                                        <p>TRX : {lastCompletedTx.transactionNo}</p>
                                        <p>Tgl : {new Date(lastCompletedTx.createdAt).toLocaleString('id-ID')}</p>
                                        <p>------------------------------</p>
                                    </div>
                                    <div className="space-y-1">
                                        {lastCompletedTx.items.map((it, idx) => (
                                            <div key={idx} className="flex justify-between text-[10px]">
                                                <span>{it.name} ({it.qty}x)</span>
                                                <span>Rp {it.subtotal.toLocaleString('id-ID')}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div>
                                        <p>------------------------------</p>
                                        <div className="flex justify-between font-black text-xs">
                                            <span>TOTAL:</span>
                                            <span>Rp {lastCompletedTx.total.toLocaleString('id-ID')}</span>
                                        </div>
                                    </div>
                                    <div className="text-center pt-2 text-[9.5px]">
                                        <p>{storeInfo.receiptFooter || 'Terima Kasih'}</p>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => window.print()} className="flex-1 py-2 bg-indigo-600 rounded-xl font-bold">Cetak</button>
                                    <button onClick={() => setIsReceiptModalOpen(false)} className="py-2 px-4 bg-slate-800 rounded-xl">Tutup</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
