                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-slate-300 font-bold">SKU</label>
                                            <input type="text" value={productForm.sku} onChange={e => setProductForm({...productForm, sku: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white font-semibold mt-1"/>
                                        </div>
                                        <div>
                                            <label className="text-slate-300 font-bold">Barcode</label>
                                            <input type="text" value={productForm.barcode} onChange={e => setProductForm({...productForm, barcode: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white font-semibold mt-1"/>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-slate-300 font-bold">Harga Modal / HPP (Rp) *</label>
                                            <input type="number" required value={productForm.costPrice} onChange={e => setProductForm({...productForm, costPrice: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white font-bold mt-1"/>
                                        </div>
                                        <div>
                                            <label className="text-slate-300 font-bold">Harga Jual (Rp) *</label>
                                            <input type="number" required value={productForm.sellingPrice} onChange={e => setProductForm({...productForm, sellingPrice: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white font-bold mt-1"/>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-slate-300 font-bold">Stok Awal</label>
                                            <input type="number" value={productForm.stock} onChange={e => setProductForm({...productForm, stock: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white font-bold mt-1"/>
                                        </div>
                                        <div>
                                            <label className="text-slate-300 font-bold">Minimum Stok</label>
                                            <input type="number" value={productForm.minStock} onChange={e => setProductForm({...productForm, minStock: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white font-bold mt-1"/>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-slate-300 font-bold">Tanggal Expired</label>
                                        <input type="date" value={productForm.expiredDate} onChange={e => setProductForm({...productForm, expiredDate: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white font-semibold mt-1"/>
                                    </div>

                                    <div className="flex gap-2 pt-2">
                                        <button type="button" onClick={() => setIsProductModalOpen(false)} className="flex-1 py-2.5 bg-slate-800 text-slate-300 rounded-xl font-bold">Batal</button>
                                        <button type="submit" className="flex-1 py-2.5 bg-indigo-600 text-white rounded-xl font-bold">Simpan Produk</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL SCAN VISUAL FOTO PRODUK REAL (TENSORFLOW AI) */}
                    {isVisualScanOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-3xl p-5 space-y-4 text-center shadow-2xl">
                                <h3 className="font-bold text-white text-sm flex items-center justify-center gap-2">
                                    <i data-lucide="camera" className="w-4 h-4 text-indigo-400"></i> Visual Scan AI Foto Produk
                                </h3>

                                <div className="border-2 border-indigo-500/50 rounded-2xl overflow-hidden bg-slate-950 h-56 relative flex items-center justify-center">
                                    <video 
                                        ref={visualVideoRef} 
                                        autoPlay 
                                        playsInline 
                                        muted 
                                        className="w-full h-full object-cover"
                                    ></video>

                                    {isAiLoading && (
                                        <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-xs flex flex-col items-center justify-center p-3">
                                            <div className="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-2"></div>
                                            <p className="text-xs font-bold text-indigo-300 animate-pulse">Proses Identifikasi AI...</p>
                                        </div>
                                    )}
                                </div>

                                {aiDetectedName && (
                                    <p className="text-xs font-bold text-emerald-400 bg-emerald-500/10 p-2 rounded-xl border border-emerald-500/20 truncate">
                                        {aiDetectedName}
                                    </p>
                                )}

                                <div className="space-y-2">
                                    <button 
                                        onClick={handleCaptureAndDetectAi}
                                        disabled={isAiLoading}
                                        className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 text-white rounded-xl text-xs font-extrabold shadow-lg shadow-indigo-600/30 flex items-center justify-center gap-2"
                                    >
                                        <i data-lucide="sparkles" className="w-4 h-4"></i>
                                        {isAiLoading ? "Sedang Menganalisis..." : "Ambil Foto & Deteksi AI"}
                                    </button>
                                    <button onClick={() => setIsVisualScanOpen(false)} className="w-full py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-xs font-bold">
                                        Tutup
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL PEMBAYARAN */}
                    {isPaymentModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-md rounded-3xl p-5 space-y-4 shadow-2xl">
                                <h3 className="font-bold text-white text-base">Pembayaran Kasir</h3>
                                
                                <div className="grid grid-cols-2 gap-2 text-xs">
                                    <div>
                                        <label className="text-slate-300 font-bold">Nama Kasir (Opsional)</label>
                                        <input 
                                            type="text" 
                                            placeholder="Contoh: Budi"
                                            value={cashierInput}
                                            onChange={e => setCashierInput(e.target.value)}
                                            className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white font-semibold mt-1"
                                        />
                                    </div>
                                    <div>
                                        <label className="text-slate-300 font-bold">Pelanggan (Opsional)</label>
                                        <input 
                                            type="text" 
                                            placeholder="Contoh: Pak Andi"
                                            value={customerInput}
                                            onChange={e => setCustomerInput(e.target.value)}
                                            className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white font-semibold mt-1"
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label className="text-xs text-slate-300 font-bold">Metode Pembayaran</label>
                                    <div className="grid grid-cols-3 gap-2 mt-1">
                                        {['CASH', 'QRIS', 'DEBIT'].map(m => (
                                            <button 
                                                key={m} 
                                                onClick={() => setPaymentMethod(m)} 
                                                className={`py-2 rounded-xl text-xs font-extrabold border transition ${paymentMethod === m ? 'bg-indigo-600 border-indigo-500 text-white shadow-md' : 'bg-slate-950 border-slate-800 text-slate-400'}`}
                                            >
                                                {m}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {paymentMethod === 'CASH' && (
                                    <div>
                                        <label className="text-xs text-slate-300 font-bold">Uang Diterima (Rp)</label>
                                        <input 
                                            type="number" 
                                            placeholder={grandTotal.toString()}
                                            value={cashPaid}
                                            onChange={e => setCashPaid(e.target.value)}
                                            className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white font-black text-lg sm:text-xl tabular-nums mt-1"
                                        />
                                    </div>
                                )}

                                <div className="p-3.5 bg-slate-950 rounded-xl space-y-1.5 text-xs border border-slate-800">
                                    <div className="flex justify-between items-center text-slate-300 font-semibold gap-2">
                                        <span>Total Tagihan:</span>
                                        <span className="font-black text-indigo-300 text-xs sm:text-sm tabular-nums whitespace-nowrap shrink-0">Rp {grandTotal.toLocaleString('id-ID')}</span>
                                    </div>
                                    {paymentMethod === 'CASH' && (
                                        <div className="flex justify-between items-center text-slate-300 font-semibold gap-2">
                                            <span>Kembalian:</span>
                                            <span className="font-black text-emerald-300 text-xs sm:text-sm tabular-nums whitespace-nowrap shrink-0">
                                                Rp {Math.max(0, (parseFloat(cashPaid) || grandTotal) - grandTotal).toLocaleString('id-ID')}
                                            </span>
                                        </div>
                                    )}
                                </div>

                                <div className="flex gap-2">
                                    <button onClick={() => setIsPaymentModalOpen(false)} className="flex-1 py-2.5 bg-slate-800 text-slate-300 rounded-xl text-xs font-bold">Batal</button>
                                    <button onClick={handleCompletePayment} className="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-bold shadow-lg shadow-indigo-600/30">Selesaikan & Cetak</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL CETAK STRUK */}
                    {isReceiptModalOpen && lastCompletedTx && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-xs rounded-3xl p-5 space-y-4 shadow-2xl">
                                <h3 className="font-bold text-white text-sm text-center">Struk Transaksi Minimarket</h3>
                                
                                <div id="receipt-print-area" className="bg-white text-black p-3.5 rounded-xl receipt-font text-[11px] space-y-2 border border-slate-300 font-bold">
                                    <div className="text-center font-extrabold">
                                        <p className="text-xs sm:text-sm uppercase">{storeInfo.storeName || 'VELO MART MINIMARKET'}</p>
                                        <p className="font-semibold text-[9.5px]">{storeInfo.address}</p>
                                        {storeInfo.phone && <p className="font-semibold text-[9.5px]">Telp: {storeInfo.phone}</p>}
                                        <p className="tracking-tighter">------------------------------</p>
                                    </div>
                                    <div className="space-y-0.5 text-[9.5px] font-bold">
                                        <p>No TRX : {lastCompletedTx.transactionNo}</p>
                                        <p>Tgl    : {new Date(lastCompletedTx.createdAt).toLocaleString('id-ID')}</p>
                                        {lastCompletedTx.cashierName && <p>Kasir  : {lastCompletedTx.cashierName}</p>}
                                        {lastCompletedTx.customerName && <p>Pelang : {lastCompletedTx.customerName}</p>}
                                        <p className="tracking-tighter">------------------------------</p>
                                    </div>

                                    <div className="space-y-1.5 text-[11px]">
                                        {lastCompletedTx.items.map((item, i) => (
                                            <div key={i}>
                                                <p className="font-extrabold break-words leading-tight">{item.name}</p>
                                                <div className="flex justify-between items-center text-[10px] font-bold mt-0.5 pr-1">
                                                    <span className="whitespace-nowrap shrink-0">{item.qty} x {item.price.toLocaleString('id-ID')}</span>
                                                    <span className="font-black whitespace-nowrap ml-1 shrink-0">Rp {item.subtotal.toLocaleString('id-ID')}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="pt-1 text-[11px] space-y-0.5">
                                        <p className="tracking-tighter">------------------------------</p>
                                        <div className="flex justify-between items-center font-black text-xs pr-1">
                                            <span className="shrink-0">TOTAL</span>
                                            <span className="whitespace-nowrap shrink-0 font-black">Rp {lastCompletedTx.total.toLocaleString('id-ID')}</span>
                                        </div>
                                        <div className="flex justify-between items-center text-[10px] font-bold pr-1">
                                            <span className="shrink-0">Bayar ({lastCompletedTx.paymentMethod})</span>
                                            <span className="whitespace-nowrap shrink-0">Rp {lastCompletedTx.paid.toLocaleString('id-ID')}</span>
                                        </div>
                                        <div className="flex justify-between items-center text-[10px] font-bold pr-1">
                                            <span className="shrink-0">Kembali</span>
                                            <span className="whitespace-nowrap shrink-0">Rp {lastCompletedTx.change.toLocaleString('id-ID')}</span>
                                        </div>
                                    </div>

                                    <div className="text-center pt-2 text-[9.5px] font-semibold">
                                        <p className="whitespace-pre-line">{storeInfo.receiptFooter}</p>
                                    </div>
                                </div>

                                <div className="flex gap-2">
                                    <button onClick={() => window.print()} className="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-bold flex items-center justify-center gap-1 shadow-lg shadow-indigo-600/30">
                                        <i data-lucide="printer" className="w-4 h-4"></i> Cetak Struk
                                    </button>
                                    <button onClick={() => setIsReceiptModalOpen(false)} className="py-2.5 px-4 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-xs font-bold">
                                        Selesai
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
